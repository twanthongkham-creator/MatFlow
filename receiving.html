<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Receiving</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #fffbeb; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .label-auto { color: #0369a1; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .auto-fill-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 15px; }
        .btn-add { background-color: #f59e0b; color: white; border-radius: 12px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-warning m-0">📥 รับเข้าวัตถุดิบ (In)</h2>
        <a href="index.html" class="btn btn-outline-secondary">ไปหน้าเบิกจ่าย</a>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <div class="row g-4">
            <div class="col-md-5">
                <label class="form-label fw-bold">1. ระบุรหัสวัตถุดิบ (RM_Code)</label>
                <input list="masterList" id="codeInput" class="form-control form-control-lg border-2" placeholder="พิมพ์รหัส..." oninput="onCodeChange()">
                <datalist id="masterList"></datalist>

                <div class="auto-fill-box mt-3">
                    <div class="row">
                        <div class="col-6">
                            <span class="label-auto">RM_Name</span>
                            <div id="resName" class="fw-bold text-dark">-</div>
                        </div>
                        <div class="col-6">
                            <span class="label-auto">Supplier</span>
                            <div id="resSupplier" class="fw-bold text-dark">-</div>
                        </div>
                        <div class="col-12 mt-2">
                            <span class="label-auto">Unit</span>
                            <div id="resUnit" class="fw-bold text-primary h5">-</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">2. เลข Batch</label>
                        <input type="text" id="batchInput" class="form-control" placeholder="ระบุเลข Batch">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">3. จำนวนที่รับ</label>
                        <input type="number" id="qtyInput" class="form-control" value="1">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">4. วันผลิต (MFG)</label>
                        <input type="date" id="mfgInput" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">5. วันหมดอายุ (EXP)</label>
                        <input type="date" id="expInput" class="form-control">
                    </div>
                    <div class="col-12 text-end">
                        <button class="btn btn-add btn-lg px-5 mt-2" onclick="addToQueue()">+ เพิ่มเข้ารายการ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="qArea" class="d-none">
        <h5 class="fw-bold mb-3 text-secondary">รายการเตรียมบันทึก</h5>
        <div id="qList"></div>
        <button class="btn btn-success btn-lg w-100 mt-4 fw-bold" onclick="doSubmit()">บันทึกรับเข้าทั้งหมด</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';
    let master = [];
    let queue = [];
    let selected = null;

    window.onload = async () => {
        const res = await fetch(`${SCRIPT_URL}?action=getMasterData`);
        const json = await res.json();
        master = json.data;
        const dl = document.getElementById('masterList');
        master.forEach(i => {
            let op = document.createElement('option');
            op.value = i.code; op.textContent = i.name;
            dl.appendChild(op);
        });
    };

    function onCodeChange() {
        const code = document.getElementById('codeInput').value;
        selected = master.find(i => i.code === code);
        document.getElementById('resName').innerText = selected ? selected.name : "-";
        document.getElementById('resUnit').innerText = selected ? selected.unit : "-";
        document.getElementById('resSupplier').innerText = selected ? selected.supplier : "-";
    }

    function addToQueue() {
        const batch = document.getElementById('batchInput').value;
        const qty = parseFloat(document.getElementById('qtyInput').value);
        const mfg = document.getElementById('mfgInput').value;
        const exp = document.getElementById('expInput').value;

        if(!selected || !batch || isNaN(qty) || !mfg || !exp) return alert("กรอกข้อมูลให้ครบ!");

        queue.push({ ...selected, batch, qty, mfgDate: mfg, expDate: exp });
        render();
        document.getElementById('codeInput').value = '';
        onCodeChange();
    }

    function render() {
        document.getElementById('qArea').classList.toggle('d-none', queue.length === 0);
        document.getElementById('qList').innerHTML = queue.map((item, i) => `
            <div class="card p-3 mb-2 border-start border-4 border-warning shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="badge bg-warning text-dark me-2">${item.code}</span>
                        <strong class="h6">${item.name}</strong><br>
                        <small>Batch: ${item.batch} | จำนวน: ${item.qty} ${item.unit} | Supplier: ${item.supplier}</small>
                    </div>
                    <button class="btn btn-sm btn-outline-danger" onclick="queue.splice(${i},1);render()">ลบ</button>
                </div>
            </div>
        `).join('');
    }

    async function doSubmit() {
        const op = prompt("ชื่อผู้บันทึก:");
        if(!op) return;
        const res = await fetch(`${SCRIPT_URL}?action=receive&items=${encodeURIComponent(JSON.stringify(queue))}&operator=${encodeURIComponent(op)}`);
        const json = await res.json();
        if(json.status === 'success') { alert("สำเร็จ: " + json.docNo); location.reload(); }
    }
</script>
</body>
</html>
