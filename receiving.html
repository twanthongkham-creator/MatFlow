<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Receiving (Column Fix)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #fffbeb; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .auto-fill-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 15px; }
        .op-card { background-color: #1e293b; color: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="op-card d-flex justify-content-between align-items-center">
        <h4 class="fw-bold m-0 text-warning">MatFlow <span class="text-white">Receiving</span></h4>
        <div style="width: 250px;">
            <label class="small text-uppercase fw-bold opacity-75">ผู้บันทึก (Default)</label>
            <input type="text" id="opName" class="form-control form-control-sm" value="Admin">
        </div>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <div class="row g-4">
            <div class="col-md-5 border-end">
                <label class="form-label fw-bold">1. ระบุรหัสวัตถุดิบ (RM_Code)</label>
                <input list="masterList" id="codeInput" class="form-control form-control-lg" placeholder="พิมพ์รหัส..." oninput="onCodeChange()">
                <datalist id="masterList"></datalist>

                <div class="auto-fill-box mt-3">
                    <div class="row">
                        <div class="col-12 mb-2"><span class="small text-muted">RM_Name:</span><div id="resName" class="fw-bold">-</div></div>
                        <div class="col-6"><span class="small text-muted">Supplier:</span><div id="resSupplier" class="fw-bold">-</div></div>
                        <div class="col-6"><span class="small text-muted">Unit:</span><div id="resUnit" class="fw-bold text-primary">-</div></div>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label fw-bold small">2. เลข Batch</label><input type="text" id="batchInput" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold small">3. จำนวนที่รับ</label><input type="number" id="qtyInput" class="form-control" value="1"></div>
                    <div class="col-md-6"><label class="form-label fw-bold small">4. วันผลิต (MFG)</label><input type="date" id="mfgInput" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label fw-bold small">5. วันหมดอายุ (BBF)</label><input type="date" id="expInput" class="form-control"></div>
                    <div class="col-12 text-end pt-2"><button class="btn btn-warning btn-lg px-5 fw-bold shadow-sm" onclick="addToQueue()">+ เพิ่มลงคิว</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="qArea" class="d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold text-secondary m-0">📦 รายการรอรับเข้า</h5>
            <a href="index.html" class="btn btn-sm btn-link">ไปหน้า Planning</a>
        </div>
        <div id="qList"></div>
        <button id="btnSubmit" class="btn btn-success btn-lg w-100 mt-4 fw-bold shadow" onclick="doSubmit()">ยืนยันบันทึกทั้งหมดลงสต๊อก</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';
    let master = []; let queue = []; let selected = null;

    window.onload = async () => {
        const res = await fetch(`${SCRIPT_URL}?action=getMasterData`);
        const json = await res.json();
        master = json.data;
        const dl = document.getElementById('masterList');
        master.forEach(i => { let op = document.createElement('option'); op.value = i.code; op.textContent = i.name; dl.appendChild(op); });
    };

    function onCodeChange() {
        const code = document.getElementById('codeInput').value;
        selected = master.find(i => i.code === code);
        document.getElementById('resName').innerText = selected ? selected.name : "-";
        document.getElementById('resUnit').innerText = selected ? selected.unit : "-";
        document.getElementById('resSupplier').innerText = selected ? selected.supplier : "-";
    }

    function addToQueue() {
        const batch = document.getElementById('batchInput').value;
        const qty = parseFloat(document.getElementById('qtyInput').value);
        const mfg = document.getElementById('mfgInput').value;
        const exp = document.getElementById('expInput').value;
        if(!selected || !batch || isNaN(qty) || !mfg || !exp) return alert("กรอกข้อมูลให้ครบ!");

        queue.push({ ...selected, batch, qty, mfgDate: mfg, expDate: exp });
        render();
        document.getElementById('codeInput').value = '';
        document.getElementById('batchInput').value = '';
        onCodeChange();
    }

    function render() {
        document.getElementById('qArea').classList.toggle('d-none', queue.length === 0);
        document.getElementById('qList').innerHTML = queue.map((item, i) => `
            <div class="card p-3 mb-2 border-start border-4 border-warning shadow-sm">
                <div class="d-flex justify-content-between align-items-center">
                    <div><strong>${item.name}</strong> (${item.code})<br><small>Batch: ${item.batch} | Qty: ${item.qty} ${item.unit} | MFG: ${item.mfgDate} | EXP: ${item.expDate}</small></div>
                    <button class="btn btn-sm btn-outline-danger" onclick="queue.splice(${i},1);render()">ลบ</button>
                </div>
            </div>
        `).join('');
    }

    async function doSubmit() {
        const op = document.getElementById('opName').value || "Admin";
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "กำลังบันทึก...";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=receive&items=${encodeURIComponent(JSON.stringify(queue))}&operator=${encodeURIComponent(op)}`);
            const json = await res.json();
            if(json.status === 'success') { alert("บันทึกสำเร็จ!"); location.reload(); }
            else { alert("Error: " + json.message); btn.disabled = false; btn.innerText = "ยืนยันบันทึกทั้งหมด"; }
        } catch (e) { alert("ล้มเหลว"); btn.disabled = false; }
    }
</script>
</body>
</html>
