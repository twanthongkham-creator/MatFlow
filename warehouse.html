<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MatFlow — คลังสินค้า (Warehouse)</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="mf-theme.css">
<style>
body { overflow-x: hidden; }
.workspace-grid { display:grid; grid-template-columns:350px 1fr; gap:20px; align-items:start; }
.workspace-grid > div { min-width: 0; }
@media(max-width:991px){ 
  .workspace-grid { grid-template-columns:1fr; }
  .plan-panel { position: relative !important; top: 0 !important; max-height: none !important; margin-bottom: 20px; }
}

/* ล็อกสี SVG ไม่ให้ดำทึบ */
.plan-hd svg, .empty-sim svg, .btn-print svg, .status-badge svg, .sim-idx svg, .btn-green svg, .stat-ok svg, .stat-ng svg { fill: none !important; }

.plan-panel { background:var(--glass); backdrop-filter:blur(20px) saturate(150%); border:1px solid var(--glass-border); border-radius:var(--r-xl); box-shadow:var(--sh-sm),var(--sh-inset); padding:20px; position:sticky; top:80px; max-height:85vh; overflow-y:auto; }
.plan-hd { font-size:16px; font-weight:700; color:var(--b3); margin-bottom:15px; display:flex; align-items:center; gap:8px; border-bottom:1px solid rgba(180,210,255,.3); padding-bottom:12px; position:sticky; top:0; background:var(--glass); z-index:10; }

.q-card { background:rgba(255,255,255,.6); border:1px solid rgba(180,210,255,.4); border-radius:12px; padding:12px; margin-bottom:10px; cursor:pointer; transition:.2s; position:relative; }
.q-card:hover { background:rgba(255,255,255,.9); border-color:var(--b2); box-shadow:0 4px 12px rgba(0,40,160,.05); transform:translateY(-2px); }
.q-card.active { background:rgba(255,255,255,.95); border:1.5px solid var(--b2); box-shadow:0 0 0 4px rgba(66,146,255,.1); }
.q-no { font-size:11px; color:var(--txt3); font-family:'IBM Plex Mono',monospace; font-weight:600; margin-bottom:4px; }
.q-title { font-weight:700; color:var(--txt); font-size:14px; margin-bottom:4px; }
.q-qty { font-weight:600; color:var(--txt2); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* 🚩 ปรับให้ Card ประวัติทึบแสง ไม่ใสทะลุหลัง */
.sim-card { background:#ffffff; border:1px solid #cbd5e1; border-radius:var(--r-xl); box-shadow:0 4px 15px rgba(0,0,0,0.05); overflow:hidden; margin-bottom:16px; animation:fadeUp .3s ease-out; }
.sim-hd { display:flex; align-items:center; gap:12px; padding:16px 20px; background:#f8fafc; border-bottom:1px solid #cbd5e1; }
.sim-idx { width:32px; height:32px; background:var(--b2); color:#fff; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; font-family:'IBM Plex Mono',monospace; }
.sim-title { flex:1; }
.sim-pname { font-size:16px; font-weight:700; color:var(--txt); margin-bottom:2px; }
.sim-bd { padding:0 20px 20px; overflow-x: auto; background:#ffffff; }

/* ทำให้กล่องพื้นหลังในมือถือขาวทึบ */
.a3 { background: #fdfdfd; border-radius: var(--r-xl); padding: 15px; border: 1px solid #e2e8f0; }

.rm-table { width:100%; min-width: 700px; border-collapse:collapse; font-size:13px; margin-top:16px; }
.rm-table th { font-size:10px; font-weight:700; text-transform:uppercase; color:var(--txt3); padding:8px 10px; border-bottom:2px solid #cbd5e1; text-align:center; }
.rm-table td { padding:10px; vertical-align:middle; border-bottom:1px solid #e2e8f0; font-weight:500; text-align:center; }
.text-left { text-align: left !important; }
.td-rm { font-weight:700; color:var(--txt); font-size:13.5px; }
.td-num { font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:13.5px; }

.stat-ok { color:#059669; background:rgba(5,150,105,.1); padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid rgba(5,150,105,.2); display:inline-flex; align-items:center; justify-content:center; gap:4px; }
.stat-ng { color:#dc2626; background:rgba(220,38,38,.1); padding:4px 8px; border-radius:6px; font-size:11px; font-weight:700; border:1px solid rgba(220,38,38,.2); display:inline-flex; align-items:center; justify-content:center; gap:4px; }
.stat-ng svg, .stat-ok svg { width:12px; height:12px; stroke:currentColor; stroke-width:2.5; fill:none; }
.status-badge { padding:6px 14px; border-radius:var(--r-pill); font-size:12.5px; font-weight:700; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.s-pass { background:rgba(5,150,105,.12); color:#059669; border:1px solid rgba(5,150,105,.25); }
.s-fail { background:rgba(220,38,38,.12); color:#dc2626; border:1px solid rgba(220,38,38,.25); }
.s-issued { background:rgba(13,148,136,.12); color:#0f766e; border:1px solid rgba(13,148,136,.25); }

.empty-sim { text-align:center; padding:60px 20px; color:var(--txt3); background:#ffffff; border:1px dashed var(--glass-border); border-radius:var(--r-xl); }
.empty-sim svg { width:48px; height:48px; stroke:rgba(66,146,255,.4); fill:none; stroke-width:1.5; margin-bottom:16px; }
.op-input { width:100%; font-family:'IBM Plex Sans Thai',sans-serif; font-size:14px; background:#fff; border:1.5px solid #cbd5e1; border-radius:10px; padding:10px 14px; outline:none; transition:.15s; margin-bottom:14px; font-weight:600; color:var(--txt); cursor:pointer; }
.op-input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(5,150,105,.15); }
.btn-print { font-size:11px; font-weight:700; color:#0284c7; background:transparent; border:1px solid #7dd3fc; padding:4px 10px; border-radius:6px; cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:4px; }
.btn-print:hover { background:#f0f9ff; border-color:#0284c7; }
.btn-print svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2.5; }

.nav-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; font-size: 10px; font-weight: 800; color: #fff; margin-left: 8px; font-family: 'IBM Plex Mono', monospace; box-shadow: 0 2px 5px rgba(0,0,0,0.15); transform: translateY(-1px); }
.badge-wh { background: linear-gradient(135deg, #f59e0b, #d97706); border: 1.5px solid rgba(255,255,255,0.3); }
.badge-pd { background: linear-gradient(135deg, #3b82f6, #1d4ed8); border: 1.5px solid rgba(255,255,255,0.3); }

/* สไตล์สำหรับกล่องเลือกหลาย Batch */
.batch-group { text-align: left; max-height: 90px; overflow-y: auto; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px; background: rgba(255,255,255,0.8); }
.batch-group label { display: block; margin-bottom: 4px; font-size: 11.5px; cursor: pointer; color: var(--txt); }
.batch-group input[type="checkbox"] { margin-right: 6px; transform: scale(1.1); accent-color: var(--b2); }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="mf-shared.js?v=7"></script>
<script>
let _bomMap = {}; let _stockMap = {}; let _batchMap = {}; let _pendingReqs = [];
let _activeReq = null;
let _warehouseUsers = []; 
let _allHistory = []; 
let _transactions = []; 

window.onload = () => { loadMasterData(); };

async function loadMasterData() {
  mfShow('กำลังอัปเดตข้อมูลคิวงาน...');
  try {
    const [jmaster, jm, jreq, jusers, jtx] = await Promise.all([
      MF.getMasterData(), 
      MF.getMonitorData(), 
      MF.getRequests(), 
      MF.getUsers(),
      MF.getTransactions() 
    ]);
    
    _warehouseUsers = (jusers.data || []).filter(u => u.dept === 'Warehouse' || u.dept === 'Planning');
    _transactions = (jtx && jtx.data) ? jtx.data : [];

    _stockMap = {}; _batchMap = {};
    (jm.data || []).forEach(row => {
      const c = row.code; const q = parseFloat(row.qty)||0;
      if (c && q > 0) {
        _stockMap[c] = (_stockMap[c] || 0) + q;
        if(!_batchMap[c]) _batchMap[c] = [];
        _batchMap[c].push({ batch: row.batch||'N/A', qty: q, exp: new Date(row.exp).toLocaleDateString('en-GB') });
      }
    });

    _bomMap = {};
    (jmaster.data || []).forEach(rm => {
      const p = rm.productName; const c = rm.code;
      if (!p || !c) return;
      if (!_bomMap[p]) _bomMap[p] = [];
      if (!_bomMap[p].find(x => x.code === c)) {
        _bomMap[p].push({ code: c, rmName: rm.name, unitPerPack: parseFloat(rm.unitPerPack)||1, packSize: parseFloat(rm.packSize)||1, packName: rm.packageType||'แพ็ค', sysUnit: rm.unit||'Unit' });
      }
    });

    _allHistory = jreq.data || [];
    _pendingReqs = _allHistory.filter(r => r.status === 'Pending');
    renderQueue();
    renderCompletedHistory(); 

  } catch(e) { console.error(e); }
  mfHide();
}

function renderQueue() {
  let grouped = {};
  _pendingReqs.forEach(r => {
    if(!grouped[r.reqNo]) grouped[r.reqNo] = { reqNo: r.reqNo, reqBy: r.reqBy, items: [] };
    grouped[r.reqNo].items.push(r);
  });
  
  let html = '';
  if(Object.keys(grouped).length === 0) {
    html = `<div style="text-align:center; padding:30px 0; color:var(--txt3); font-size:13px; font-weight:600;">🎉 ไม่มีคิวงานค้าง</div>`;
  }
  
  Object.values(grouped).forEach(g => {
    const pNames = g.items.map(i => i.productTarget).join(', ');
    html += `
      <div class="q-card" id="q_${g.reqNo}" onclick="selectRequest('${g.reqNo}')">
        <div class="q-no">${g.reqNo} &nbsp;|&nbsp; เบิกโดย: ${g.reqBy}</div>
        <div class="q-title">${g.items.length} รายการขอเบิก</div>
        <div class="q-qty">${pNames}</div>
      </div>
    `;
  });
  document.getElementById('queueContainer').innerHTML = html;
}

function renderCompletedHistory() {
  const container = document.getElementById('issueResults');
  let completed = _allHistory.filter(r => r.status === 'Completed' || r.status === 'Issued');
  
  let grouped = {};
  completed.forEach(r => {
    if(!grouped[r.reqNo]) grouped[r.reqNo] = { reqNo: r.reqNo, timestamp: r.timestamp, reqBy: r.reqBy, status: r.status, issueBy: r.issueBy, issueDoc: r.issueDoc, receiveBy: r.receiveBy, items: [] };
    grouped[r.reqNo].items.push(r);
  });

  let html = `<div class="plan-hd" style="margin-bottom:16px;">ประวัติการจัดจ่าย</div>`;
  
  if(Object.keys(grouped).length === 0) {
    html += `<div class="empty-sim"><p>เลือกรายการจากเมนูด้านซ้ายเพื่อเริ่มจัดเตรียมวัตถุดิบ</p></div>`;
  } else {
    Object.values(grouped).slice(0, 10).forEach(g => { 
      let itemsHtml = '';
      g.items.forEach(i => itemsHtml += `<div style="font-weight:700; font-size:14px; color:var(--txt); margin-bottom:2px;">• ${i.productTarget} <span style="color:var(--green); font-family:'IBM Plex Mono',monospace;">(${i.targetQty} Unit)</span></div>`);
      const dt = new Date(g.timestamp).toLocaleString('en-GB', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
      
      let badgeHtml = '';
      if(g.status === 'Issued') {
         badgeHtml = `<div class="status-badge s-issued">รอผลิตรับของ</div>`;
      } else {
         badgeHtml = `<div class="status-badge s-pass">ผลิตรับแล้ว</div>`;
      }

      html += `
        <div class="sim-card" style="padding:16px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
            <div>
              <div style="font-size:11px; color:var(--txt3); font-family:'IBM Plex Mono',monospace; font-weight:600; margin-bottom:2px;">${g.reqNo} &nbsp;|&nbsp; ${dt}</div>
              <div style="font-size:11px; color:var(--txt3); font-weight:600;">
                ผู้เบิก: ${g.reqBy} <span style="color:var(--b2)">• จ่ายโดย: ${g.issueBy}</span>
                ${g.receiveBy ? `<span style="color:#059669">• รับโดย: ${g.receiveBy}</span>` : ''}
              </div>
              <div style="margin-top:6px;">
                <button class="btn-print" onclick="printDocument('${g.reqNo}')">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px;"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg> 
                  พิมพ์ใบเบิก (มีชื่อผู้จัดจ่าย)
                </button>
              </div>
            </div>
            ${badgeHtml}
          </div>
          <div style="background:rgba(240,244,248,.6); padding:10px 14px; border-radius:8px; border:1px solid #e2e8f0;">${itemsHtml}</div>
        </div>
      `;
    });
  }
  container.innerHTML = html;
}

function selectRequest(reqNo) {
  document.querySelectorAll('.q-card').forEach(el => el.classList.remove('active'));
  document.getElementById('q_'+reqNo).classList.add('active');
  const items = _pendingReqs.filter(r => r.reqNo === reqNo);
  _activeReq = { reqNo: reqNo, items: items };
  runCalculation();
}

window.checkSubmitBtn = function() {
  const op = document.getElementById('opName').value;
  const pin = document.getElementById('opPin').value;
  const btn = document.getElementById('btnRealConfirm');
  if (btn) btn.disabled = !(_activeReq && op && pin.length >= 4);
};

window.handleBatchCb = function(cb) {
  let group = cb.closest('.batch-group');
  let cbs = group.querySelectorAll('.b-cb');
  if(cb.value === "Auto FIFO" && cb.checked) {
      cbs.forEach(c => { if(c !== cb) c.checked = false; });
  } else if(cb.checked) {
      let fifoCb = group.querySelector('input[value="Auto FIFO"]');
      if(fifoCb) fifoCb.checked = false;
  }
};

function runCalculation() {
  const container = document.getElementById('issueResults');
  if (!_activeReq) { renderCompletedHistory(); return; }
  
  let html = `<div style="display:flex; justify-content:space-between; margin-bottom:16px; align-items:center;">
                <div class="plan-hd" style="margin-bottom:0; border-bottom:none; padding-bottom:0;">
                  จัดเตรียมวัตถุดิบ
                </div>
                <button class="btn-print" onclick="printDocument('${_activeReq.reqNo}')">
                  พิมพ์ใบนำร่องจัดของ
                </button>
              </div>`;
  let allPass = true;

  _activeReq.items.forEach((item, index) => {
    const bom = _bomMap[item.productTarget] || [];
    let isGroupPass = true; let tableRows = '';

    if (bom.length === 0) {
      tableRows = `<tr><td colspan="6" style="text-align:center;color:var(--txt3);">ไม่พบสูตรวัตถุดิบ (BOM) สำหรับสินค้านี้</td></tr>`;
      isGroupPass = false; allPass = false;
    } else {
      bom.forEach(rm => {
        const prepPackages = Number((item.targetQty / rm.unitPerPack).toFixed(4));
        let reqQty = (rm.sysUnit.toUpperCase() === 'UN') ? Number((prepPackages * rm.unitPerPack).toFixed(4)) : Number((prepPackages * rm.packSize).toFixed(4));
        
        const currentStock = _stockMap[rm.code] || 0;
        const isOk = currentStock >= reqQty;
        if(!isOk) { isGroupPass = false; allPass = false; }

        let optsHtml = `<label><input type="checkbox" value="Auto FIFO" checked class="b-cb" onchange="handleBatchCb(this)"> Auto FIFO</label>`;
        // 🚩 ส่วนที่แก้ไขให้โชว์ BBF ในรายการตัวเลือกของคลัง
        (_batchMap[rm.code] || []).forEach(b => {
             optsHtml += `<label><input type="checkbox" value="${b.batch}" class="b-cb" onchange="handleBatchCb(this)"> Lot: ${b.batch} | มี ${b.qty.toLocaleString()} | BBF: ${b.exp}</label>`;
        });
        if((_batchMap[rm.code] || []).length === 0) optsHtml = `<div style="font-size:11px; color:red;">ไม่มีสต๊อกในคลัง</div>`;

        let safeCode = encodeURIComponent(String(rm.code));
        let safePName = encodeURIComponent(String(item.productTarget));

        let statIcon = isOk ? '<span class="stat-ok">พอ</span>' : '<span class="stat-ng">ขาด</span>';

        tableRows += `
          <tr>
            <td><span style="font-size:10px; font-weight:700; color:var(--b2); background:rgba(66,146,255,.1); padding:4px 8px; border-radius:6px;">${rm.code}</span></td>
            <td class="td-rm text-left">${rm.rmName}</td>
            <td class="td-num" style="color:var(--txt2);">${prepPackages.toLocaleString()} <span style="font-size:10px;">${rm.packName}</span></td>
            <td class="td-num t-req">${reqQty.toLocaleString()} <span style="font-size:10px;">${rm.sysUnit}</span></td>
            <td style="padding: 4px;">
               <div class="batch-group" data-code="${safeCode}" data-pname="${safePName}">
                   ${optsHtml}
               </div>
            </td>
            <td>${statIcon}</td>
          </tr>
        `;
      });
    }

    const badge = isGroupPass 
      ? `<div class="status-badge s-pass">สต๊อกพร้อมจ่าย</div>` 
      : `<div class="status-badge s-fail">วัตถุดิบไม่พอ</div>`;

    html += `
      <div class="sim-card" style="padding:0; display:block;">
        <div class="sim-hd">
          <div class="sim-idx" style="background:var(--b2);">${index+1}</div>
          <div class="sim-title">
            <div style="font-size:11px; color:var(--txt3); font-weight:600; margin-bottom:2px;">อ้างอิง: ${_activeReq.reqNo}</div>
            <div class="sim-pname">${item.productTarget}</div>
            <div style="font-size:12px; color:var(--txt3); font-weight:500;">สั่งผลิต: <span style="font-weight:700; color:var(--b3);">${item.targetQty}</span> Unit</div>
          </div>
          ${badge}
        </div>
        <div class="sim-bd">
          <table class="rm-table">
            <thead>
              <tr>
                <th width="1%">Code</th>
                <th class="text-left">RM Name</th>
                <th>คลังเตรียม</th>
                <th>ตัด Stock (Unit จริง)</th>
                <th width="40%">เลือก Batch ที่จะตัด (ติ๊กได้หลายข้อ)</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
    `;
  });

  let userOpts = '<option value="">-- เลือกพนักงานคลัง --</option>';
  _warehouseUsers.forEach(u => userOpts += `<option value="${u.empId}">${u.empId} - ${u.name}</option>`);

  html += `
    <div style="background:var(--glass); border-radius:var(--r-xl); padding:20px; box-shadow:var(--sh-sm);">
      <label style="font-size:11px; font-weight:700; color:var(--txt3); margin-bottom:8px; display:block;">ยืนยันตัวตน (พนักงานคลังสินค้า)</label>
      <div style="display:flex; gap:10px; margin-bottom:14px;">
        <select id="opName" class="op-input" style="margin-bottom:0; flex:6;" onchange="checkSubmitBtn()">${userOpts}</select>
        <input type="password" id="opPin" class="op-input" style="margin-bottom:0; flex:4; text-align:center;" placeholder="PIN 4 หลัก" maxlength="4" inputmode="numeric" pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, ''); checkSubmitBtn()">
      </div>
      <button id="btnRealConfirm" class="btn btn-green w-100" onclick="executeIssueDirectly()" disabled style="padding:14px; font-size:14px;">
        ยืนยันตัด Stock (ส่งเข้าไลน์ผลิต)
      </button>
    </div>
  `;
  container.innerHTML = html;
}

function printDocument(reqNo) {
  const reqItems = _allHistory.filter(r => r.reqNo === reqNo);
  if(reqItems.length === 0) return;
  
  const first = reqItems[0];
  const isWarehouse = true; 
  const isCompleted = first.status === 'Completed' || first.status === 'Issued'; 

  let printData = {
    reqNo: reqNo,
    date: new Date(first.timestamp).toLocaleDateString('en-GB'),
    reqBy: first.reqBy || "....................",
    issueBy: isCompleted ? first.issueBy : "....................",
    receiveBy: first.receiveBy || "....................", 
    products: []
  };

  reqItems.forEach(item => {
    let productEntry = { 
      pName: item.productTarget, 
      targetQty: item.targetQty, 
      items: [] 
    };

    const bom = _bomMap[item.productTarget] || [];
    bom.forEach(rm => {
      const prepPackages = Number((item.targetQty / rm.unitPerPack).toFixed(4));
      let reqQty = (rm.sysUnit.toUpperCase() === 'UN') ? Number((prepPackages * rm.unitPerPack).toFixed(4)) : Number((prepPackages * rm.packSize).toFixed(4));

      let batchVal = '';
      if (isCompleted) {
          const txs = _transactions.filter(t => String(t.reqNo) === String(reqNo) && String(t.code) === String(rm.code));
          if(txs.length > 0) {
              let uniqueBatches = [...new Set(txs.map(t => t.batch))];
              let bbfArr = uniqueBatches.map(b => {
                  let match = (_batchMap[rm.code] || []).find(x => String(x.batch) === String(b));
                  let bbfStr = match ? match.exp : "-";
                  return `${b} (BBF: ${bbfStr})`;
              });
              batchVal = bbfArr.join(', ');
          } else { batchVal = '-'; }
      } else if (isWarehouse) {
          const group = Array.from(document.querySelectorAll('.batch-group')).find(g => decodeURIComponent(g.getAttribute('data-code')) === String(rm.code) && decodeURIComponent(g.getAttribute('data-pname')) === String(item.productTarget));
          if(group) {
              let checked = group.querySelectorAll('.b-cb:checked');
              let selectedOpts = Array.from(checked).map(c => c.value);
              if(selectedOpts.includes('Auto FIFO') || selectedOpts.length === 0) {
                  batchVal = 'Auto FIFO';
              } else {
                  let bbfArr = selectedOpts.map(b => {
                      let match = (_batchMap[rm.code] || []).find(x => String(x.batch) === String(b));
                      let bbfStr = match ? match.exp : "-";
                      return `${b} (BBF: ${bbfStr})`;
                  });
                  batchVal = bbfArr.join(', ');
              }
          } else { batchVal = 'Auto FIFO'; }
      }

      productEntry.items.push({ code: rm.code, rmName: rm.rmName, qty: reqQty, unit: rm.sysUnit, batch: batchVal });
    });
    
    printData.products.push(productEntry);
  });

  sessionStorage.setItem('printData', JSON.stringify(printData));
  window.open('form.html', '_blank');
}

async function executeIssueDirectly() {
  const op = document.getElementById('opName').value.trim();
  const pin = document.getElementById('opPin').value.trim();
  if(!op || pin.length < 4) return alert('กรุณาระบุรหัสพนักงานและ PIN ให้ครบถ้วน');

  const groups = document.querySelectorAll('.batch-group');
  let payload = [];
  
  _activeReq.items.forEach(item => {
      const bom = _bomMap[item.productTarget] || [];
      bom.forEach(rm => {
         let group = Array.from(groups).find(g => decodeURIComponent(g.getAttribute('data-code')) === String(rm.code) && decodeURIComponent(g.getAttribute('data-pname')) === String(item.productTarget));
         
         let selectedBatches = [];
         if(group) {
             let checked = group.querySelectorAll('.b-cb:checked');
             checked.forEach(c => selectedBatches.push(c.value));
         }
         
         let batchStr = selectedBatches.length > 0 ? selectedBatches.join(',') : 'Auto FIFO';

         const prepPackages = Number((item.targetQty / rm.unitPerPack).toFixed(4));
         let reqQty = (rm.sysUnit.toUpperCase() === 'UN') ? Number((prepPackages * rm.unitPerPack).toFixed(4)) : Number((prepPackages * rm.packSize).toFixed(4));

         payload.push({ code: rm.code, name: rm.rmName, cutQty: reqQty, unit: rm.sysUnit, batch: batchStr, productTarget: item.productTarget });
      });
  });

  mfShow('กำลังตัด Stock (ส่งเข้าไลน์ผลิต)...');
  try {
    const j = await MF.issueMulti(payload, op, pin, _activeReq.reqNo);
    if(j.status === 'success') {
      alert(`✅ ตัดสต๊อกสำเร็จ สถานะรอผลิตรับเข้าไลน์\nเลขที่เอกสาร: ${j.docNo}`);
      _activeReq = null;
      MF.bust('getRequests'); 
      await loadMasterData(); 
      if (typeof MF.updateNavBadges === 'function') MF.updateNavBadges();
    } else { 
      alert('เกิดข้อผิดพลาด: ' + j.message); 
    }
  } catch(e) { alert('การบันทึกล้มเหลว กรุณาลองใหม่'); }
  mfHide();
}
</script>
