<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Sermsuk PLC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f4f8; color: #334155; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #0284c7; border: none; border-radius: 10px; }
        .status-bar { font-size: 0.8rem; padding: 5px 15px; border-radius: 20px; background: #e2e8f0; }
        .table thead { background-color: #1e293b; color: white; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark m-0">MatFlow</h2>
        <div id="statusIndicator" class="status-bar text-muted">กำลังเริ่มระบบ...</div>
    </div>

    <div class="card p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-bold">1. เลือกสินค้าที่ต้องการผลิต</label>
                <select id="productSelect" class="form-select form-select-lg" disabled>
                    <option>กำลังดึงข้อมูล...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">2. จำนวน Unit</label>
                <input type="number" id="targetQty" class="form-control form-control-lg" value="12">
            </div>
            <div class="col-md-4">
                <button id="btnEval" class="btn btn-primary btn-lg w-100 fw-bold" onclick="evaluateStock()" disabled>ประเมินวัตถุดิบ</button>
            </div>
        </div>
    </div>

    <div id="resultBox" class="card p-4 d-none">
        <h5 class="fw-bold mb-3 border-bottom pb-2">📦 รายการวัตถุดิบที่ต้องเบิก</h5>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr><th>รหัส</th><th>ชื่อวัตถุดิบ</th><th class="text-center">ต้องใช้</th><th class="text-center">สถานะ</th></tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
        <button id="btnIssue" class="btn btn-success btn-lg w-100 mt-3 fw-bold d-none" onclick="confirmIssue()">ยืนยันการเบิกจ่าย (FIFO)</button>
    </div>
</div>

<script>
    // 🚩 วาง URL ใหม่ของคุณที่นี่
    const SCRIPT_URL = 'ใส่_URL_ที่_ได้_จากการ_Deploy_ตรงนี้';

    const updateStatus = (msg, color = '#64748b') => {
        const el = document.getElementById('statusIndicator');
        el.innerText = msg; el.style.color = color;
    };

    window.onload = async () => {
        updateStatus("🔄 กำลังเชื่อมต่อฐานข้อมูล Master...");
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getProducts`);
            const json = await res.json();
            
            if(json.status === 'success') {
                const select = document.getElementById('productSelect');
                select.innerHTML = '<option value="">-- เลือกรายการผลิต --</option>';
                json.data.forEach(p => select.innerHTML += `<option value="${p}">${p}</option>`);
                select.disabled = false;
                document.getElementById('btnEval').disabled = false;
                updateStatus("✅ ระบบพร้อมใช้งาน", "#059669");
            } else {
                updateStatus("❌ Error: " + json.message, "#dc2626");
            }
        } catch (e) {
            updateStatus("❌ ไม่สามารถติดต่อ API ได้", "#dc2626");
        }
    };

    async function evaluateStock() {
        const product = document.getElementById('productSelect').value;
        const qty = document.getElementById('targetQty').value;
        if(!product) return alert("กรุณาเลือกสินค้า");

        updateStatus("⌛ กำลังตรวจสอบสต๊อก...");
        try {
            const res = await fetch(`${SCRIPT_URL}?action=evaluate&product=${encodeURIComponent(product)}&qty=${qty}`);
            const json = await res.json();
            if(json.status === 'success') {
                renderTable(json.data);
                updateStatus("✅ ประเมินเสร็จสิ้น");
            }
        } catch (e) { updateStatus("❌ ประเมินผิดพลาด", "#dc2626"); }
    }

    function renderTable(data) {
        document.getElementById('resultBox').classList.remove('d-none');
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        let allAvailable = true;

        data.forEach(item => {
            if(item.status !== 'OK') allAvailable = false;
            tbody.innerHTML += `<tr>
                <td><code class="fw-bold">${item.code}</code></td>
                <td class="fw-medium">${item.name}</td>
                <td class="text-center fw-bold">${item.required} <small>${item.unit}</small></td>
                <td class="text-center">
                    ${item.status === 'OK' ? '<span class="badge bg-success">✅ พร้อม</span>' : '<span class="badge bg-danger">❌ ขาด '+item.shortage+'</span>'}
                </td>
            </tr>`;
        });
        document.getElementById('btnIssue').classList.toggle('d-none', !allAvailable);
    }

    async function confirmIssue() {
        const op = prompt("ระบุชื่อผู้ดำเนินการเบิกจ่าย:");
        if(!op) return;
        
        updateStatus("💾 กำลังบันทึกธุรกรรม...");
        try {
            const product = document.getElementById('productSelect').value;
            const qty = document.getElementById('targetQty').value;
            const res = await fetch(`${SCRIPT_URL}?action=issue&product=${encodeURIComponent(product)}&qty=${qty}&operator=${encodeURIComponent(op)}`);
            const json = await res.json();
            if(json.status === 'success') {
                alert("สำเร็จ! เลขที่เอกสาร: " + json.docNo);
                location.reload();
            } else { alert("เกิดข้อผิดพลาด: " + json.message); }
        } catch (e) { updateStatus("❌ บันทึกไม่สำเร็จ", "#dc2626"); }
    }
</script>
</body>
</html>
