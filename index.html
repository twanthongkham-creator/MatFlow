<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MatFlow — แผนกวางแผน (Planning)</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="mf-theme.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* 🚩 ป้องกันหน้าจอมือถือขยายออกด้านข้าง */
body { overflow-x: hidden; }

.workspace-grid { display:grid; grid-template-columns:350px 1fr; gap:20px; align-items:start; }
.workspace-grid > div { min-width: 0; }
@media(max-width:991px){ .workspace-grid { grid-template-columns:1fr; } }

.plan-panel {
  background:var(--glass); backdrop-filter:blur(20px) saturate(150%); -webkit-backdrop-filter:blur(20px) saturate(150%);
  border:1px solid var(--glass-border); border-radius:var(--r-xl);
  box-shadow:var(--sh-sm),var(--sh-inset); padding:20px; position:sticky; top:80px;
}
</style>
</head>
<body>

<div id="loader" class="loader-overlay">
  <div class="loader-box">
    <div class="spinner-border text-primary" role="status"></div>
    <div id="loaderText" class="mt-3 fw-bold">กำลังประมวลผล...</div>
  </div>
</div>

<div id="navDrawer" class="nav-drawer">
  <div class="nav-content">
    <div class="nav-header">
      <div class="nav-logo">MATFLOW</div>
      <button class="btn-close-nav" onclick="mfToggleDrawer()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">📊 วางแผนการผลิต</a>
      <a href="warehouse.html">📦 คลังสินค้า <span id="badgeWH" class="nav-badge badge-wh" style="display:none">0</span></a>
      <a href="production.html">🏭 ฝ่ายผลิต <span id="badgePD" class="nav-badge badge-pd" style="display:none">0</span></a>
      <a href="receiving.html">📥 รับวัตถุดิบ</a>
      <a href="management.html">⚙️ จัดการสต๊อก</a>
      <a href="dashboard.html">📈 รายงานสรุป</a>
    </nav>
  </div>
</div>

<header class="app-bar">
  <div class="container-fluid d-flex align-items-center">
    <button class="btn-icon me-3" onclick="mfToggleDrawer()" id="hIcon">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h1 class="app-title m-0">Planning <span class="app-subtitle">| แผนกวางแผน</span></h1>
  </div>
</header>

<main class="container-fluid py-4 mt-5">
  <div class="workspace-grid">
    <div class="plan-panel">
      <div class="d-flex align-items-center mb-3">
        <div class="plan-ico me-2">📝</div>
        <h2 class="h5 m-0 fw-bold">สร้างแผนจำลอง</h2>
      </div>
      <div id="planBuilder"></div>
      <button class="btn btn-primary w-100 mt-3 py-3 fw-bold shadow-sm" onclick="addPlanItem()">+ เพิ่มสินค้าในแผน</button>
      <button class="btn btn-success w-100 mt-2 py-3 fw-bold shadow-sm" onclick="runSimulation()">🚀 ประเมินความพร้อม</button>
    </div>

    <div id="simResult">
       <div class="empty-sim text-center py-5">
          <div class="mb-3">📊</div>
          <h3 class="h5 text-secondary">ยังไม่มีข้อมูลการจำลอง</h3>
          <p class="text-muted small">กรุณาเลือกสินค้าและจำนวนจากด้านซ้ายเพื่อเริ่มการประเมิน</p>
       </div>
    </div>
  </div>
</main>

<script src="mf-shared.js"></script>
<script>
let allProducts = [];
let masterData = [];
let planItems = [];

// 🟢 โหลดข้อมูลจาก Supabase 🟢
async function init() {
  mfShow('กำลังโหลดข้อมูลมาสเตอร์...');
  try {
    const [pRes, mRes] = await Promise.all([
      MF.getProducts(),
      MF.getMasterData()
    ]);
    
    if(pRes.status === 'success') allProducts = pRes.data;
    if(mRes.status === 'success') masterData = mRes.data;
    
    addPlanItem(); // เริ่มต้นด้วย 1 แถว
  } catch(e) {
    alert('โหลดข้อมูลล้มเหลว: ' + e.message);
  }
  mfHide();
}

function addPlanItem() {
  const id = Date.now();
  planItems.push({ id, pName: '', qty: 1 });
  renderPlanBuilder();
}

function renderPlanBuilder() {
  const container = document.getElementById('planBuilder');
  container.innerHTML = planItems.map((item, idx) => `
    <div class="mb-3 p-3 bg-light border rounded-3 position-relative">
      <label class="form-label small fw-bold text-secondary">สินค้าชิ้นที่ ${idx+1}</label>
      <select class="form-select mb-2" onchange="updatePlan(${item.id}, 'pName', this.value)">
        <option value="">เลือกสินค้า...</option>
        ${allProducts.map(p => `<option value="${p}" ${item.pName === p ? 'selected' : ''}>${p}</option>`).join('')}
      </select>
      <input type="number" class="form-control" placeholder="จำนวน (Unit)" value="${item.qty}" onchange="updatePlan(${item.id}, 'qty', this.value)">
      ${idx > 0 ? `<button class="btn-close position-absolute top-0 end-0 m-2" onclick="removePlan(${item.id})"></button>` : ''}
    </div>
  `).join('');
}

function updatePlan(id, key, val) {
  const item = planItems.find(i => i.id === id);
  if(item) item[key] = (key === 'qty') ? Number(val) : val;
}

function removePlan(id) {
  planItems = planItems.filter(i => i.id !== id);
  renderPlanBuilder();
}

async function runSimulation() {
  const validPlans = planItems.filter(p => p.pName && p.qty > 0);
  if(validPlans.length === 0) return alert('กรุณาระบุสินค้าและจำนวนให้ถูกต้อง');

  mfShow('กำลังวิเคราะห์สต๊อก...');
  try {
    const res = await MF.getMonitorData();
    const inventory = res.data;
    
    // คำนวณสต๊อกรวมราย Code
    let stockMap = {};
    inventory.forEach(i => {
      stockMap[i.code] = (stockMap[i.code] || 0) + parseFloat(i.qty || 0);
    });

    renderSimulationResult(validPlans, stockMap);
  } catch(e) {
    alert('เกิดข้อผิดพลาดในการจำลอง: ' + e.message);
  }
  mfHide();
}

function renderSimulationResult(plans, stockMap) {
  const container = document.getElementById('simResult');
  let html = `<h2 class="h4 mb-4 fw-bold text-primary">📊 ผลการประเมินความพร้อมการผลิต</h2>`;
  
  plans.forEach((plan, index) => {
    let pass = true;
    let tableRows = '';
    
    // หา BOM จาก MasterData
    const boms = masterData.filter(m => m.productName === plan.pName);
    
    boms.forEach(rm => {
      // คำนวณจำนวนที่ต้องใช้ (Logic เดิมจาก Code.gs)
      const reqPerUnit = (rm.unit && rm.unit.toUpperCase() === 'UN') ? 1 : (parseFloat(rm.packSize) / parseFloat(rm.unitPerPack || 1));
      const totalReq = plan.qty * reqPerUnit;
      const currentStock = stockMap[rm.code] || 0;
      const isOK = currentStock >= totalReq;
      if(!isOK) pass = false;

      tableRows += `
        <tr>
          <td><small class="text-muted font-monospace">${rm.code}</small></td>
          <td>${rm.name}</td>
          <td class="text-end fw-bold">${totalReq.toLocaleString()}</td>
          <td class="text-end ${isOK ? 'text-success' : 'text-danger'} fw-bold">${currentStock.toLocaleString()}</td>
          <td class="text-center">${isOK ? '✅ พอ' : '❌ ไม่พอ'}</td>
        </tr>`;
    });

    html += `
      <div class="card shadow-sm border-0 mb-4 rounded-4 overflow-hidden">
        <div class="card-header ${pass ? 'bg-success text-white' : 'bg-warning text-dark'} py-3 px-4 border-0">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">#${index+1} ${plan.pName}</h5>
            <span class="badge ${pass ? 'bg-white text-success' : 'bg-danger text-white'} rounded-pill px-3">
              ${pass ? 'พร้อมผลิต' : 'วัตถุดิบไม่พอ'}
            </span>
          </div>
          <div class="small mt-1 opacity-75">เป้าหมาย: ${plan.qty.toLocaleString()} Unit</div>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover m-0">
            <thead class="table-light">
              <tr class="small text-uppercase fw-bold">
                <th>Code</th><th>วัตถุดิบ</th><th class="text-end">ต้องใช้</th><th class="text-end">คงเหลือ</th><th class="text-center">ผล</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

// เริ่มต้นโหลดข้อมูล
init();
</script>
</body>
</html>
