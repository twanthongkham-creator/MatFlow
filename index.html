<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วางแผนผลิต & ประเมินวัตถุดิบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-custom th { background-color: #0f172a; color: white; font-weight: 500; }
        .status-badge { font-size: 0.9rem; padding: 6px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0d6efd; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        .icon-svg { display: inline-block; vertical-align: text-bottom; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <h2 class="mb-4 text-primary fw-bold d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="icon-svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
        </svg>
        ระบบวางแผนผลิต และ ประเมินวัตถุดิบ
    </h2>

    <div class="card p-4 mb-4">
        <div class="row align-items-end">
            <div class="col-md-5 mb-3 mb-md-0">
                <label class="form-label fw-bold text-secondary">1. เลือกสินค้าที่ต้องการผลิต</label>
                <div class="input-group">
                    <select id="productSelect" class="form-select" disabled>
                        <option value="">กำลังโหลดข้อมูลสินค้า...</option>
                    </select>
                </div>
            </div>
            <div class="col-md-3 mb-3 mb-md-0">
                <label class="form-label fw-bold text-secondary">2. จำนวนเป้าหมาย (Unit)</label>
                <input type="number" id="targetQty" class="form-control" placeholder="เช่น 12" min="1" value="12">
            </div>
            <div class="col-md-4">
                <button id="btnEvaluate" class="btn btn-primary w-100 fw-bold d-flex justify-content-center align-items-center gap-2" onclick="evaluateStock()" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span id="evalBtnText">ประเมินวัตถุดิบที่ต้องใช้</span>
                    <span id="evalLoading" class="loader d-none ms-2"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="card p-4 d-none" id="resultContainer">
        <h5 class="fw-bold mb-3 d-flex align-items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                <line x1="9" y1="14" x2="15" y2="14"></line>
                <line x1="9" y1="18" x2="15" y2="18"></line>
                <line x1="9" y1="10" x2="15" y2="10"></line>
            </svg>
            รายการวัตถุดิบที่ต้องเตรียม <span class="text-primary ms-2" id="lblProductName"></span>
        </h5>
        <div class="table-responsive">
            <table class="table table-hover table-custom align-middle">
                <thead>
                    <tr>
                        <th width="15%">รหัส</th>
                        <th width="35%">ชื่อวัตถุดิบ (RM Name)</th>
                        <th width="15%" class="text-center">ต้องใช้ (Required)</th>
                        <th width="15%" class="text-center">คงเหลือ (Available)</th>
                        <th width="20%" class="text-center">สถานะสต๊อก</th>
                    </tr>
                </thead>
                <tbody id="resultBody">
                    </tbody>
            </table>
        </div>
        
        <div class="text-end mt-3">
            <button id="btnIssueStock" class="btn btn-success px-5 fw-bold d-none align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                ยืนยันการเบิกจ่ายตัดสต๊อก
            </button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzSCYYJ58u7S4bnTtvou85QwbQDVnjfl3jvMft1TZ6V6ugYKkZTAwk-lP41Ko_NbjU/exec';

    window.onload = function() {
        loadProducts();
    };

    async function loadProducts() {
        try {
            const response = await fetch(`${SCRIPT_URL}?action=getProducts`);
            const result = await response.json();
            
            const select = document.getElementById('productSelect');
            const btnEval = document.getElementById('btnEvaluate');
            
            select.innerHTML = '<option value="">-- กรุณาเลือกสินค้า --</option>';
            
            if(result.status === 'success') {
                result.data.forEach(product => {
                    const option = document.createElement('option');
                    option.value = product;
                    option.textContent = product;
                    select.appendChild(option);
                });
                select.disabled = false;
                btnEval.disabled = false;
            } else {
                select.innerHTML = `<option value="">เกิดข้อผิดพลาด: ${result.message}</option>`;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('productSelect').innerHTML = '<option value="">โหลดข้อมูลล้มเหลว (เช็ก Internet)</option>';
        }
    }

    async function evaluateStock() {
        const product = document.getElementById('productSelect').value;
        const qty = document.getElementById('targetQty').value;
        
        if(!product || !qty) {
            alert('กรุณาเลือกสินค้าและใส่จำนวนเป้าหมายให้ครบถ้วน');
            return;
        }

        document.getElementById('evalBtnText').textContent = 'กำลังคำนวณ...';
        document.getElementById('evalLoading').classList.remove('d-none');
        document.getElementById('btnEvaluate').disabled = true;
        
        try {
            const response = await fetch(`${SCRIPT_URL}?action=evaluate&product=${encodeURIComponent(product)}&qty=${qty}`);
            const result = await response.json();
            
            if(result.status === 'success') {
                renderTable(result.data, product, qty);
            } else {
                alert('เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: ' + result.message);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('ไม่สามารถเชื่อมต่อฐานข้อมูลได้');
        } finally {
            document.getElementById('evalBtnText').textContent = 'ประเมินวัตถุดิบที่ต้องใช้';
            document.getElementById('evalLoading').classList.add('d-none');
            document.getElementById('btnEvaluate').disabled = false;
        }
    }

    function renderTable(data, product, targetQty) {
        document.getElementById('resultContainer').classList.remove('d-none');
        document.getElementById('lblProductName').textContent = `(ผลิต ${product} จำนวน ${targetQty} Unit)`;
        
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        
        let allStockOk = true;

        // เตรียม SVG สำหรับสถานะ
        const svgCheck = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
        const svgAlert = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;

        data.forEach(item => {
            const isOk = item.status === 'OK';
            if(!isOk) allStockOk = false;

            const statusHtml = isOk 
                ? `<span class="badge bg-success status-badge">${svgCheck} เพียงพอ</span>`
                : `<span class="badge bg-danger status-badge">${svgAlert} ขาดอีก ${item.shortage} ${item.unit}</span>`;

            const row = `
                <tr>
                    <td><span class="text-secondary small">[${item.code}]</span></td>
                    <td class="fw-bold">${item.name}</td>
                    <td class="text-center text-primary fw-bold fs-5">${item.required} <span class="fs-6 text-muted">${item.unit}</span></td>
                    <td class="text-center ${isOk ? 'text-success' : 'text-danger'} fw-bold">${item.available} <span class="small text-muted">${item.unit}</span></td>
                    <td class="text-center">${statusHtml}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

        const btnIssue = document.getElementById('btnIssueStock');
        if(allStockOk && data.length > 0) {
            btnIssue.classList.remove('d-none');
            btnIssue.classList.add('d-inline-flex'); // เพื่อให้ปุ่มและ SVG จัดเรียงกันสวยงาม
        } else {
            btnIssue.classList.add('d-none');
            btnIssue.classList.remove('d-inline-flex');
        }
    }
</script>

</body>
</html>
