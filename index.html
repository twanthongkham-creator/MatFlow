<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - ระบบบริหารสต๊อก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; color: #334155; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #0284c7; border: none; border-radius: 12px; }
        .btn-success { background-color: #059669; border: none; border-radius: 12px; }
        .status-bar { font-size: 0.85rem; padding: 6px 15px; border-radius: 30px; background: #e2e8f0; }
        .table thead { background-color: #1e293b; color: white; border-radius: 10px; }
        .badge-ready { background-color: #dcfce7; color: #166534; }
        .badge-short { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold text-primary m-0">MatFlow</h1>
        <div id="statusTag" class="status-bar">📡 กำลังเชื่อมต่อระบบ...</div>
    </div>

    <div class="card p-4 mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-bold small text-uppercase text-secondary">เลือกสินค้าที่ต้องการผลิต</label>
                <select id="productSelect" class="form-select form-select-lg" disabled>
                    <option>กำลังโหลดข้อมูลสินค้า...</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-uppercase text-secondary">จำนวนเป้าหมาย (Unit)</label>
                <input type="number" id="targetQty" class="form-control form-control-lg" value="12" min="1">
            </div>
            <div class="col-md-4">
                <button id="btnEval" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm" onclick="evaluateStock()" disabled>
                    ประเมินวัตถุดิบ
                </button>
            </div>
        </div>
    </div>

    <div id="resultBox" class="card p-4 d-none">
        <div class="d-flex align-items-center gap-2 mb-3">
            <h5 class="fw-bold m-0 text-dark">📋 แผนการเบิกจ่ายวัตถุดิบ (ข้ามรายการ Ignore)</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>รหัส</th>
                        <th>ชื่อวัตถุดิบ</th>
                        <th class="text-center">ต้องใช้</th>
                        <th class="text-center">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </div>
        <div class="text-end mt-4">
            <button id="btnIssue" class="btn btn-success btn-lg px-5 fw-bold d-none shadow" onclick="confirmIssue()">
                ยืนยันการตัดสต๊อก (FIFO)
            </button>
        </div>
    </div>
</div>

<script>
    // 🚩 URL ล่าสุดของคุณ (อย่าลืมเปลี่ยนถ้าคุณ Deploy ใหม่)
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';

    const setStatus = (msg, color = '#64748b') => {
        const el = document.getElementById('statusTag');
        el.innerText = msg; el.style.color = color;
    };

    // โหลดรายชื่อสินค้าเมื่อเปิดหน้าเว็บ
    window.onload = async () => {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getProducts`);
            const json = await res.json();
            
            if(json.status === 'success') {
                const select = document.getElementById('productSelect');
                select.innerHTML = '<option value="">-- เลือกรายการผลิต --</option>';
                json.data.forEach(p => select.innerHTML += `<option value="${p}">${p}</option>`);
                select.disabled = false;
                document.getElementById('btnEval').disabled = false;
                setStatus("✅ ระบบพร้อมทำงาน", "#059669");
            } else {
                setStatus("❌ Error: " + json.message, "#dc2626");
            }
        } catch (e) {
            setStatus("❌ ไม่สามารถติดต่อ API ได้ (ตรวจสอบ Deployment)", "#dc2626");
        }
    };

    // ฟังก์ชันประเมินสต๊อก
    async function evaluateStock() {
        const product = document.getElementById('productSelect').value;
        const qty = document.getElementById('targetQty').value;
        if(!product) return alert("กรุณาเลือกรายการสินค้า");

        setStatus("⏳ กำลังตรวจสอบสต๊อกคงเหลือ...");
        try {
            const res = await fetch(`${SCRIPT_URL}?action=evaluate&product=${encodeURIComponent(product)}&qty=${qty}`);
            const json = await res.json();
            if(json.status === 'success') {
                renderTable(json.data);
                setStatus("✅ ตรวจสอบเสร็จสิ้น");
            }
        } catch (e) { setStatus("❌ ประเมินผิดพลาด", "#dc2626"); }
    }

    // แสดงข้อมูลลงในตาราง
    function renderTable(data) {
        document.getElementById('resultBox').classList.remove('d-none');
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        let canIssue = true;

        data.forEach(item => {
            if(item.status !== 'OK') canIssue = false;
            tbody.innerHTML += `
                <tr>
                    <td><code class="fw-bold">${item.code}</code></td>
                    <td class="fw-medium">${item.name}</td>
                    <td class="text-center fw-bold">${item.required} <small class="text-muted">${item.unit}</small></td>
                    <td class="text-center">
                        ${item.status === 'OK' 
                            ? '<span class="badge badge-ready p-2">✅ พร้อมใช้งาน</span>' 
                            : `<span class="badge badge-short p-2">❌ ขาด ${item.shortage} ${item.unit}</span>`}
                    </td>
                </tr>`;
        });
        document.getElementById('btnIssue').classList.toggle('d-none', !canIssue);
    }

    // ยืนยันการตัดสต๊อก
    async function confirmIssue() {
        const op = prompt("กรุณาระบุชื่อผู้ดำเนินการเบิกจ่าย:");
        if(!op) return;
        
        setStatus("💾 กำลังบันทึกธุรกรรมลงฐานข้อมูล...");
        try {
            const product = document.getElementById('productSelect').value;
            const qty = document.getElementById('targetQty').value;
            const res = await fetch(`${SCRIPT_URL}?action=issue&product=${encodeURIComponent(product)}&qty=${qty}&operator=${encodeURIComponent(op)}`);
            const json = await res.json();
            if(json.status === 'success') {
                alert("บันทึกสำเร็จ!\nเลขที่เอกสาร: " + json.docNo);
                location.reload(); // รีเฟรชยอดใหม่
            } else { alert("เกิดข้อผิดพลาด: " + json.message); }
        } catch (e) { setStatus("❌ บันทึกไม่สำเร็จ", "#dc2626"); }
    }
</script>

</body>
</html>
