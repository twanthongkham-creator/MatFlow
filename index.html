<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Planning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .card { border-radius: 16px; border: none; }
        .btn-add { background-color: #0ea5e9; color: white; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-primary">📋 MatFlow - Planning</h2>
        <a href="receiving.html" class="btn btn-warning text-white fw-bold">ไปหน้า รับเข้า (In)</a>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-bold">เลือกสินค้าที่จะผลิต</label>
                <select id="pSelect" class="form-select form-select-lg"></select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">จำนวน Unit</label>
                <input type="number" id="tQty" class="form-control form-control-lg" value="12">
            </div>
            <div class="col-md-4">
                <button class="btn btn-add btn-lg w-100 fw-bold" onclick="add()">+ Add รายการสินค้า</button>
            </div>
        </div>
    </div>

    <div id="qBox" class="mb-4 d-none">
        <h6 class="fw-bold text-secondary mb-3">ตะกร้าสินค้าเตรียมผลิต</h6>
        <div id="qList"></div>
        <button class="btn btn-primary w-100 btn-lg fw-bold mt-3 shadow" onclick="eval()">ประเมินสต๊อกรวม (Common Check)</button>
    </div>

    <div id="resBox" class="card p-4 d-none shadow">
        <h5 class="fw-bold mb-3">สรุปวัตถุดิบที่ต้องใช้ (RM_Name)</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr><th>รหัส (RM_Code)</th><th>ชื่อวัตถุดิบ</th><th class="text-center">ต้องใช้</th><th class="text-center">สถานะ</th></tr>
                </thead>
                <tbody id="resBody"></tbody>
            </table>
        </div>
        <button id="btnIss" class="btn btn-success btn-lg w-100 mt-3 fw-bold d-none" onclick="iss()">ยืนยันเบิกจ่าย FIFO</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';
    let queue = [];

    window.onload = async () => {
        const res = await fetch(`${SCRIPT_URL}?action=getProducts`);
        const json = await res.json();
        const sel = document.getElementById('pSelect');
        sel.innerHTML = '<option value="">-- เลือกรายการ --</option>';
        json.data.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
    };

    function add() {
        const name = document.getElementById('pSelect').value;
        const qty = parseInt(document.getElementById('tQty').value);
        if(!name || !qty) return alert("ระบุข้อมูลก่อน");
        queue.push({ name, qty });
        render();
    }

    function render() {
        document.getElementById('qBox').classList.toggle('d-none', queue.length === 0);
        document.getElementById('qList').innerHTML = queue.map((i, idx) => `
            <div class="card p-3 mb-2 border-start border-4 border-info shadow-sm d-flex flex-row justify-content-between">
                <strong>${i.name} (${i.qty} Unit)</strong>
                <button class="btn btn-sm btn-link text-danger" onclick="queue.splice(${idx},1);render()">ลบ</button>
            </div>
        `).join('');
    }

    async function eval() {
        const res = await fetch(`${SCRIPT_URL}?action=evaluateMulti&items=${encodeURIComponent(JSON.stringify(queue))}`);
        const json = await res.json();
        const tbody = document.getElementById('resBody');
        tbody.innerHTML = '';
        let ok = true;
        json.data.forEach(i => {
            if(i.status !== 'OK') ok = false;
            tbody.innerHTML += `<tr>
                <td><code>${i.code}</code></td>
                <td>${i.name}</td>
                <td class="text-center fw-bold">${i.required} ${i.unit}</td>
                <td class="text-center">${i.status === 'OK' ? '✅' : '❌ ขาด '+i.shortage}</td>
            </tr>`;
        });
        document.getElementById('resBox').classList.remove('d-none');
        document.getElementById('btnIss').classList.toggle('d-none', !ok);
    }

    async function iss() {
        const op = prompt("ชื่อผู้เบิก:");
        if(!op) return;
        const res = await fetch(`${SCRIPT_URL}?action=issueMulti&items=${encodeURIComponent(JSON.stringify(queue))}&operator=${encodeURIComponent(op)}`);
        const json = await res.json();
        if(json.status === 'success') { alert("สำเร็จ: " + json.docNo); location.reload(); }
    }
</script>
</body>
</html>
