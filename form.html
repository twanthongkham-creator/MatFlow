<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>พิมพ์ใบเบิก (MatFlow) - Landscape</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* 🚩 ตั้งค่าหน้ากระดาษเป็นแนวนอน (Landscape) */
        @page { size: A4 landscape; margin: 5mm; } 
        
        body { font-family: 'Sarabun', sans-serif; font-size: 13px; color: black; background: #525659; margin: 0; padding: 20px; }
        
        /* ซ่อนปุ่มพิมพ์เวลาสั่ง Print จริง */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .page-container { box-shadow: none; margin: 0; padding: 0; }
        }

        .page-container { 
            width: 280mm; 
            min-height: 180mm; 
            padding: 5mm 8mm; 
            margin: 0 auto 15px auto; 
            background: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            box-sizing: border-box; 
            page-break-after: always; 
            position: relative; 
        }
        .page-container:last-child { page-break-after: auto; margin-bottom: 0; }
        
        .doc-id-top { position: absolute; top: 10px; right: 15px; font-size: 12px; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        .header-table { margin-bottom: 5px; }
        .header-table td { vertical-align: top; }
        .logo-img { max-height: 40px; margin-bottom: 2px; }
        
        .info-table { margin-bottom: 5px; font-size: 13px; }
        .info-table td { padding: 2px 0; }
        
        .main-table { border: 1px solid #000; text-align: center; margin-bottom: 10px; }
        .main-table th { border: 1px solid #000; padding: 6px 4px; font-size: 13px; font-weight: bold; background-color: #f2f2f2; }
        .main-table td { border: 1px solid #000; padding: 4px; font-size: 13px; height: 26px; }
        
        .text-left { text-align: left !important; padding-left: 5px !important; }
        .bold { font-weight: bold; }
        .no-wrap { white-space: nowrap; }
        
        .footer-table { width: 100%; text-align: center; border: 1px solid #000; margin-top: auto; }
        .footer-title { border: 1px solid #000; padding: 4px; font-size: 12px; font-weight: bold; background-color: #f2f2f2; }
        .footer-box { border: 1px solid #000; height: 50px; vertical-align: bottom; padding-bottom: 5px; font-size: 12px; }
        
        /* ปุ่มสั่งพิมพ์ลอยๆ บนหน้าจอ */
        .btn-print {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: #0070C0; color: white; border: none;
            padding: 10px 20px; font-size: 16px; font-family: 'Prompt', sans-serif;
            border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-print:hover { background: #005a9c; }
    </style>
</head>
<body>

    <button class="btn-print no-print" onclick="window.print()">🖨️ สั่งพิมพ์ใบเบิก</button>

    <div id="print-area"></div>

    <script>
        window.onload = function() {
            const data = JSON.parse(sessionStorage.getItem('printData') || '{}');
            
            if (!data.reqNo) {
                document.getElementById('print-area').innerHTML = `
                    <div class="page-container" style="display:flex; align-items:center; justify-content:center; height:100vh;">
                        <h2 style="color:red; font-family: 'Prompt', sans-serif;">❌ ไม่พบข้อมูลการพิมพ์ กรุณากลับไปกดปุ่มพิมพ์จากหน้าหลักอีกครั้ง</h2>
                    </div>`;
                return;
            }

            let html = '';
            
            data.products.forEach(prod => {
                let rowsHtml = '';
                
                prod.items.forEach((item, idx) => {
                    rowsHtml += `
                        <tr>
                            <td style="width:6%">${idx + 1}</td>
                            <td style="width:14%">${item.code}</td>
                            <td class="text-left" style="width:36%">${item.rmName}</td>
                            <td class="bold" style="width:12%">${item.qty.toLocaleString()}</td>
                            <td style="width:10%">${item.unit}</td>
                            <td class="text-left" style="width:22%; font-size: 10px;">${item.batch || ''}</td>
                        </tr>`;
                });

                // 🚩 แถว ProductName ทำให้เด่นขึ้น
                let targetQtyDisplay = prod.targetQty ? prod.targetQty.toLocaleString() : '_____';
                rowsHtml += `
                    <tr style="background-color: #f8fafc;">
                        <td></td>
                        <td colspan="5" class="text-left bold" style="font-size: 14px; color: #000;">
                            ผลิตภัณฑ์: <span style="color:#0070C0; font-size: 15px;">${prod.pName}</span> 
                            <span style="margin-left: 30px;">จำนวน <span style="color:#0070C0; font-size: 15px;">${targetQtyDisplay}</span> Unit</span>
                        </td>
                    </tr>`;

                // เติมแถวว่างให้ครบ 12 แถว
                for (let i = prod.items.length + 2; i <= 12; i++) {
                    rowsHtml += `<tr><td style="color:transparent; height: 26px;">-</td><td></td><td></td><td></td><td></td><td></td></tr>`;
                }

                let reqName = (data.reqBy && data.reqBy !== "....................") ? data.reqBy : ".........................";
                let issName = (data.issueBy && data.issueBy !== "....................") ? data.issueBy : ".........................";
                let rcvName = (data.receiveBy && data.receiveBy !== "....................") ? data.receiveBy : ".........................";
                
                let currentFullDate = data.date || "..../..../....";
                let rcvDate = (rcvName !== ".........................") ? currentFullDate : "..../..../....";
                
                let recorderName = issName;
                let recorderDate = rcvDate;

                html += `
                <div class="page-container">
                    <div class="doc-id-top">FM-Q-RW-001/013</div>
                    
                    <table class="header-table">
                        <tr>
                            <td width="20%">
                                <img src="https://i.postimg.cc/sxsFWk6Q/ssclogo.png" class="logo-img" alt="SSC Logo">
                                <div style="font-size:10px; font-weight:bold; color:#555;">บริษัท เสริมสุข จำกัด (มหาชน)</div>
                            </td>
                            <td width="50%">
                                <div class="bold" style="font-size:17px;">บริษัท เสริมสุข จำกัด(มหาชน) โรงงานปทุมธานี</div>
                                <div class="bold" style="font-size:16px;">ใบขอโอนพัสดุภายในโรงงานเดียวกัน(311)</div>
                                <div style="font-size:14px;">(Stock Transfer Request)</div>
                            </td>
                            <td width="30%" style="text-align:right; font-size:13px; padding-right:15px;">
                                <div class="no-wrap">เลขที่ <span class="bold" style="font-size:14px;">${data.reqNo}</span></div>
                                <div style="margin-top: 6px;">วันที่จัดทำ <span class="bold">${currentFullDate}</span></div>
                            </td>
                        </tr>
                    </table>

                    <table class="info-table">
                        <tr>
                            <td width="55%">โรงงาน/ที่เก็บสินค้าผู้ขอโอน: <span class="bold">3201-3101</span></td>
                            <td width="45%">โรงงาน/ที่เก็บสินค้าผู้จ่ายโอน: <span class="bold">3201-1201</span></td>
                        </tr>
                        <tr>
                            <td>วันที่ต้องการพัสดุ: <span class="bold">${currentFullDate}</span></td>
                            <td>เลขที่ใบจ่ายโอนจากระบบ: ........................................</td>
                        </tr>
                    </table>

                    <table class="main-table">
                        <tr>
                            <th width="6%">ลำดับ</th>
                            <th width="14%">รหัสพัสดุ</th>
                            <th width="36%">รายละเอียด</th>
                            <th width="12%">จำนวนขอโอน</th>
                            <th width="10%">หน่วยนับ</th>
                            <th width="22%">หมายเหตุ</th>
                        </tr>
                        ${rowsHtml}
                    </table>

                    <table class="footer-table">
                        <tr>
                            <td class="footer-title" width="16.6%">ผู้ขอโอน</td>
                            <td class="footer-title" width="16.6%">ผู้อนุมัติขอโอน</td>
                            <td class="footer-title" width="16.6%">ผู้จ่ายโอน</td>
                            <td class="footer-title" width="16.6%">ผู้อนุมัติจ่ายโอน</td>
                            <td class="footer-title" width="16.6%">ผู้รับของ</td>
                            <td class="footer-title" width="16.6%">ผู้บันทึกรายการ</td>
                        </tr>
                        <tr>
                            <td class="footer-box">ลงชื่อ <span class="bold">${reqName}</span><br>วันที่ ${currentFullDate}</td>
                            <td class="footer-box">ลงชื่อ <span class="bold">${reqName}</span><br>วันที่ ${currentFullDate}</td>
                            <td class="footer-box">ลงชื่อ <span class="bold">${issName}</span><br>วันที่ ${currentFullDate}</td>
                            <td class="footer-box">ลงชื่อ <span class="bold">${issName}</span><br>วันที่ ${currentFullDate}</td>
                            <td class="footer-box">ลงชื่อ <span class="bold">${rcvName}</span><br>วันที่ ${rcvDate}</td>
                            <td class="footer-box">ลงชื่อ <span class="bold">${recorderName}</span><br>วันที่ ${recorderDate}</td>
                        </tr>
                    </table>
                    <div style="font-size:10px; margin-top:5px; text-align:left; font-weight:bold;">Rev.00/Eff Date:01/06/2020</div> 
                </div>`;
            });

            document.getElementById('print-area').innerHTML = html;
        };
    </script>
</body>
</html>
