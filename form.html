<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>พิมพ์ใบเบิก (MatFlow)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าหน้ากระดาษ A4 */
        @page { size: A4 portrait; margin: 10mm; }
        body { font-family: 'Sarabun', 'Prompt', Tahoma, sans-serif; font-size: 13px; color: black; background: white; margin:0; padding:0; }
        
        /* จัดการการขึ้นหน้าใหม่ */
        .page-container { width: 100%; max-width: 800px; margin: 0 auto; page-break-after: always; padding-bottom: 20mm; }
        .page-container:last-child { page-break-after: auto; }
        
        /* สไตล์ตารางเอกสาร */
        table { width: 100%; border-collapse: collapse; border: 2px solid black; text-align: center; }
        td { border: 1px solid black; padding: 5px; }
        .border-thick { border: 2px solid black; }
        
        /* ปุ่มพิมพ์ซ้ำ (ซ่อนตอนปริ้นจริง) */
        @media print { .no-print { display: none !important; } }
        .print-btn { display:block; margin: 20px auto; padding: 10px 30px; font-size: 16px; background: #0070C0; color: white; border: none; border-radius: 8px; cursor: pointer; font-family: 'Prompt'; }
    </style>
</head>
<body>
    
    <button class="print-btn no-print" onclick="window.print()">🖨️ สั่งพิมพ์เอกสาร</button>
    
    <div id="print-content"></div>

    <script>
        window.onload = function() {
            // ดึงข้อมูล HTML ที่หน้า Production หรือ Warehouse สร้างเตรียมไว้ให้
            const content = sessionStorage.getItem('print_html_content');
            
            if (content) {
                document.getElementById('print-content').innerHTML = content;
                // สั่งเปิดหน้าต่าง Print อัตโนมัติ (หน่วงเวลาเล็กน้อยให้ฟอนต์โหลดเสร็จ)
                setTimeout(() => { window.print(); }, 500);
            } else {
                document.getElementById('print-content').innerHTML = '<h3 style="text-align:center; margin-top:50px;">❌ ไม่พบข้อมูลสำหรับการพิมพ์ กรุณากลับไปกดปุ่มพิมพ์จากหน้าหลักอีกครั้ง</h3>';
            }
        };
    </script>
</body>
</html>
