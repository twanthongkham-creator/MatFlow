<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; border: none; }
        .card-title { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid #0284c7; padding-left: 10px; }
        .nav-link { font-weight: 600; color: #64748b; border-radius: 10px; padding: 8px 16px; transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: #1e293b; color: white; }
        .badge-urgent { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-warning { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .badge-expired { background-color: #451a03; color: white; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <div>
            <h2 class="fw-bold text-primary m-0">MatFlow Dashboard</h2>
            <p class="text-muted small m-0" id="refreshTime">กำลังโหลดข้อมูลล่าสุด...</p>
        </div>
        <div class="d-flex gap-2 bg-white p-2 rounded-4 shadow-sm">
            <a href="index.html" class="nav-link">Planning</a>
            <a href="receiving.html" class="nav-link">Receiving</a>
            <a href="management.html" class="nav-link">Management</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="stat-card">
                <div class="card-title">Stock Quantity per Product (All Batches)</div>
                <div style="height: 450px; position: relative;">
                    <canvas id="capacityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="stat-card">
                <div class="card-title text-danger">Expiry Alerts (Within 30 Days)</div>
                <div class="table-responsive" style="max-height: 450px;">
                    <table class="table table-sm table-hover">
                        <thead class="sticky-top bg-white">
                            <tr class="text-muted small">
                                <th>Name / Batch</th>
                                <th class="text-center">Days Left</th>
                            </tr>
                        </thead>
                        <tbody id="expiryTableBody">
                            <tr><td colspan="2" class="text-center py-5">⌛ กำลังโหลดรายการ...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🚩 เปลี่ยน URL นี้ให้เป็นตัวล่าสุดที่คุณเพิ่ง Deploy มา
    const SCRIPT_URL = 'ใส่_URL_ล่าสุด_ของคุณ';

    async function loadDashboard() {
        console.log("Fetching dashboard data from:", SCRIPT_URL);
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            const json = await res.json();
            console.log("Received Data:", json);

            if (json.status === 'success') {
                renderCapacityChart(json.data.productionCapacity);
                renderExpiryTable(json.data.expiryTable);
                document.getElementById('refreshTime').innerText = "อัปเดตเมื่อ: " + new Date().toLocaleTimeString('th-TH');
            } else {
                alert("API Error: " + json.message);
            }
        } catch (e) {
            console.error("Fetch Error:", e);
            document.getElementById('expiryTableBody').innerHTML = `<tr><td colspan="2" class="text-center text-danger">ไม่สามารถโหลดข้อมูลได้ (ตรวจสอบ URL ใน Code)</td></tr>`;
        }
    }

    function renderCapacityChart(capacityData) {
        const labels = Object.keys(capacityData);
        const values = Object.values(capacityData);
        
        if (labels.length === 0) return console.warn("No capacity data found");

        const ctx = document.getElementById('capacityChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: 'rgba(2, 132, 199, 0.7)',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    function renderExpiryTable(expiryData) {
        const tbody = document.getElementById('expiryTableBody');
        if (!expiryData || expiryData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="text-center py-5 text-success fw-bold">✅ ไม่มีสินค้าใกล้หมดอายุใน 30 วัน</td></tr>';
            return;
        }

        tbody.innerHTML = expiryData.map(item => `
            <tr>
                <td>
                    <div class="fw-bold text-dark small">${item.name}</div>
                    <div style="font-size: 0.7rem;" class="text-muted">Batch: ${item.batch}</div>
                </td>
                <td class="text-center">
                    <span class="badge ${item.days < 0 ? 'badge-expired' : (item.days <= 7 ? 'badge-urgent' : 'badge-warning')} rounded-pill px-3">
                        ${item.days < 0 ? 'หมดอายุ' : 'เหลือ ' + item.days + ' วัน'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
