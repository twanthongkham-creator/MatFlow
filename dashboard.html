<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Pro Dashboard V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .dashboard-container { padding: 30px; max-width: 100%; margin: auto; }
        .stat-card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: none; margin-bottom: 30px; }
        .card-title { font-size: 1.1rem; font-weight: 700; color: #334155; text-transform: uppercase; margin-bottom: 25px; border-left: 6px solid #0284c7; padding-left: 15px; }
        
        .nav-custom { background: white; padding: 8px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-link { font-weight: 600; color: #64748b; padding: 12px 25px; border-radius: 14px; transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: #0f172a; color: white; }

        /* Expiry Scale Enhanced */
        .expiry-item { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; transition: 0.3s; }
        .expiry-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .scale-wrapper { position: relative; padding: 25px 0 10px 0; }
        .scale-container { height: 14px; background: #f1f5f9; border-radius: 20px; position: relative; display: flex; border: 1px solid #e2e8f0; }
        .seg-danger { width: 22.5%; background: #fee2e2; border-right: 1px dashed #ef4444; } /* 1-7 */
        .seg-warning { width: 25.8%; background: #fef3c7; border-right: 1px dashed #f59e0b; } /* 8-15 */
        .seg-safe { width: 51.7%; background: #dcfce7; } /* 16-31 */
        
        /* New Indicator Style */
        .indicator-group { position: absolute; top: -10px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .indicator-bubble { background: #1e293b; color: white; padding: 2px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; position: relative; white-space: nowrap; }
        .indicator-bubble::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 5px solid #1e293b; }
        .indicator-line { height: 28px; width: 3px; background: #1e293b; border-radius: 2px; }
        
        .day-mark { font-size: 0.7rem; color: #94a3b8; margin-top: 8px; display: flex; justify-content: space-between; font-weight: 600; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loader" class="loading-screen">
    <div class="text-center">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
        <div class="mt-3 fw-bold">กำลังเชื่อมต่อฐานข้อมูลโรงงาน...</div>
    </div>
</div>

<div class="dashboard-container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-bold text-dark m-0">MatFlow Industrial Dashboard</h1>
            <div id="lastUpdate" class="text-muted small">อัปเดตข้อมูลล่าสุดเมื่อ: --:--</div>
        </div>
        <div class="nav-custom d-flex gap-2">
            <a href="index.html" class="nav-link">Planning</a>
            <a href="receiving.html" class="nav-link">Receiving</a>
            <a href="management.html" class="nav-link">Management</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
        </div>
    </div>

    <div class="stat-card">
        <div class="card-title">Production Capacity (Potential Units - High to Low)</div>
        <div id="chartWrapper" style="width: 100%; overflow-x: auto;">
            <div id="chartContainer" style="min-height: 400px;">
                <canvas id="capacityChart"></canvas>
            </div>
        </div>
    </div>

    <div class="stat-card">
        <div class="card-title text-danger">Expiry Risk Inventory (31-Day Scale Indicator)</div>
        <div id="expiryList" class="row g-4">
            </div>
        <div id="noExpireMsg" class="text-center py-5 d-none">
            <h4 class="text-success fw-bold">✅ วัตถุดิบทุกรายการอยู่ในสถานะปลอดภัย</h4>
        </div>
    </div>
</div>

<script>
    // จดทะเบียน Plugin สำหรับแสดงตัวเลขบนแท่งกราฟ
    Chart.register(ChartDataLabels);

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';

    async function loadDashboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            const json = await res.json();
            if (json.status === 'success') {
                renderCapacityChart(json.data.productionCapacity);
                renderExpiryTimeline(json.data.expiryTable);
                document.getElementById('lastUpdate').innerText = "อัปเดตข้อมูลล่าสุดเมื่อ: " + new Date().toLocaleString('th-TH');
            }
        } catch (e) {
            console.error(e);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderCapacityChart(capacityData) {
        // จัดรูปแบบข้อมูลและ Sort จากมากไปน้อย
        let items = Object.keys(capacityData)
            .map(key => ({ name: key, value: capacityData[key] }))
            .filter(item => item.value > 0)
            .sort((a, b) => b.value - a.value);

        // ปรับความสูงของ Container ตามจำนวนสินค้า (ป้องกันแท่งซ้อน)
        const chartHeight = Math.max(400, items.length * 45);
        document.getElementById('chartContainer').style.height = chartHeight + "px";

        const ctx = document.getElementById('capacityChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();

        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: items.map(d => d.name),
                datasets: [{
                    label: 'ผลิตได้สูงสุด',
                    data: items.map(d => d.value),
                    backgroundColor: 'rgba(2, 132, 199, 0.8)',
                    hoverBackgroundColor: '#0f172a',
                    borderRadius: 6,
                    borderSkipped: false,
                    barThickness: 28
                }]
            },
            options: {
                indexAxis: 'y', // เปลี่ยนเป็นแนวนอนเพื่อให้ชื่อสินค้าไม่เบียด
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { right: 50 } }, // เว้นที่ให้ตัวเลขปลายแท่ง
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        anchor: 'end',
                        align: 'right',
                        color: '#0284c7',
                        font: { weight: 'bold', family: 'Prompt' },
                        formatter: (val) => val.toLocaleString() + " Units"
                    }
                },
                scales: {
                    x: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { family: 'Prompt' } } },
                    y: { grid: { display: false }, ticks: { font: { family: 'Prompt', weight: '600' } } }
                }
            }
        });
    }

    function renderExpiryTimeline(expiryData) {
        const container = document.getElementById('expiryList');
        const noMsg = document.getElementById('noExpireMsg');
        
        if (!expiryData || expiryData.length === 0) {
            noMsg.classList.remove('d-none');
            return;
        }

        container.innerHTML = expiryData.map(item => {
            // คำนวณตำแหน่ง % (อิงจาก 31 วัน)
            let safeDays = Math.max(0, Math.min(31, item.days));
            let position = (safeDays / 31) * 100;
            
            // กำหนดสีตามระดับความเสี่ยง
            let themeColor = "#10b981"; // ปลอดภัย
            if(item.days <= 7) themeColor = "#ef4444"; // อันตราย
            else if(item.days <= 15) themeColor = "#f59e0b"; // เตือน

            return `
                <div class="col-xl-4 col-md-6">
                    <div class="expiry-item shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div style="max-width: 70%;">
                                <div class="fw-bold text-dark text-truncate" title="${item.name}">${item.name}</div>
                                <div class="small text-muted">Batch: ${item.batch}</div>
                            </div>
                            <span class="badge rounded-pill px-3 py-2" style="background: ${themeColor}20; color: ${themeColor}; border: 1px solid ${themeColor}">
                                ${item.days < 0 ? 'Expired' : 'เหลือ ' + item.days + ' วัน'}
                            </span>
                        </div>
                        
                        <div class="scale-wrapper">
                            <div class="indicator-group" style="left: ${position}%;">
                                <div class="indicator-bubble" style="background: ${themeColor}">${item.days} วัน</div>
                                <div class="indicator-line" style="background: ${themeColor}"></div>
                            </div>
                            <div class="scale-container">
                                <div class="seg-danger"></div>
                                <div class="seg-warning"></div>
                                <div class="seg-safe"></div>
                            </div>
                            <div class="day-mark">
                                <span>0</span>
                                <span>7</span>
                                <span>15</span>
                                <span>31 วัน</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
