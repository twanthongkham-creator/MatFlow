<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; border: none; }
        .card-title { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid #0284c7; padding-left: 10px; }
        .nav-link { font-weight: 600; color: #64748b; border-radius: 10px; padding: 8px 16px; transition: 0.3s; }
        .nav-link.active { background: #1e293b; color: white; }
        .badge-urgent { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-warning { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .badge-expired { background-color: #451a03; color: white; }
        .table-sm { font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <div>
            <h2 class="fw-bold text-primary m-0">MatFlow Dashboard</h2>
            <p class="text-muted small m-0">สรุปข้อมูลคลังสินค้าโรงงาน</p>
        </div>
        <div class="d-flex gap-2 bg-white p-2 rounded-4 shadow-sm">
            <a href="index.html" class="nav-link">Planning</a>
            <a href="receiving.html" class="nav-link">Receiving</a>
            <a href="management.html" class="nav-link">Management</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="stat-card">
                <div class="card-title">Total Stock Quantity per Product (All Batches)</div>
                <div style="height: 450px;">
                    <canvas id="capacityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="stat-card">
                <div class="card-title text-danger">Expiry Alerts (Within 30 Days)</div>
                <div class="table-responsive" style="max-height: 450px; overflow-y: auto;">
                    <table class="table table-sm table-hover align-middle">
                        <thead class="sticky-top bg-white">
                            <tr class="text-muted small">
                                <th>Name (RM) / Batch</th>
                                <th class="text-center">Days Left</th>
                            </tr>
                        </thead>
                        <tbody id="expiryTableBody">
                            </tbody>
                    </table>
                </div>
                <div id="noExpireMsg" class="text-center py-5 d-none">
                    <div class="text-success fw-bold">✅ ไม่มีรายการใกล้หมดอายุใน 30 วัน</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';

    window.onload = loadDashboard;

    async function loadDashboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            const json = await res.json();
            const data = json.data;

            renderCapacityChart(data.productionCapacity);
            renderExpiryTable(data.expiryTable);
        } catch (e) {
            console.error("Dashboard Load Error:", e);
        }
    }

    function renderCapacityChart(capacityData) {
        const ctx = document.getElementById('capacityChart').getContext('2d');
        const labels = Object.keys(capacityData);
        const values = Object.values(capacityData);

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ยอดรวม Quantity (Col I)',
                    data: values,
                    backgroundColor: 'rgba(2, 132, 199, 0.7)',
                    borderColor: '#0284c7',
                    borderWidth: 2,
                    borderRadius: 10,
                    barThickness: 40
                }]
            },
            options: {
                indexAxis: 'y', // ปรับเป็นแนวนอนเพื่อให้ชื่อสินค้าอ่านง่าย
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: '#1e293b' }
                },
                scales: {
                    x: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                    y: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                }
            }
        });
    }

    function renderExpiryTable(expiryData) {
        const tbody = document.getElementById('expiryTableBody');
        const noMsg = document.getElementById('noExpireMsg');
        
        if (expiryData.length === 0) {
            noMsg.classList.remove('d-none');
            return;
        }

        tbody.innerHTML = expiryData.map(item => {
            let badgeClass = "badge-warning";
            let dayText = `เหลือ ${item.days} วัน`;
            
            if (item.days < 0) {
                badgeClass = "badge-expired";
                dayText = "หมดอายุแล้ว";
            } else if (item.days <= 7) {
                badgeClass = "badge-urgent";
            }

            return `
                <tr>
                    <td>
                        <div class="fw-bold text-dark">${item.name}</div>
                        <div class="small text-muted">Batch: ${item.batch}</div>
                    </td>
                    <td class="text-center">
                        <span class="badge ${badgeClass} rounded-pill px-3 py-2">${dayText}</span>
                    </td>
                </tr>
            `;
        }).join('');
    }
</script>
</body>
</html>
