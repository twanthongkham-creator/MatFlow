<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .stat-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: 100%; border: none; }
        .card-title { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid #0284c7; padding-left: 10px; }
        .nav-link { font-weight: 600; color: #64748b; border-radius: 10px; padding: 8px 16px; transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: #1e293b; color: white; }
        .badge-urgent { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-warning { background-color: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .badge-expired { background-color: #451a03; color: white; }
        .loading-spinner { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loader" class="loading-spinner">
    <div class="text-center">
        <div class="spinner-border text-primary mb-2"></div>
        <div class="small fw-bold">กำลังรวบรวมข้อมูล...</div>
    </div>
</div>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <div>
            <h2 class="fw-bold text-primary m-0">MatFlow Dashboard</h2>
            <p class="text-muted small m-0" id="refreshTime">กำลังโหลดข้อมูลล่าสุด...</p>
        </div>
        <div class="d-flex gap-2 bg-white p-2 rounded-4 shadow-sm">
            <a href="index.html" class="nav-link">Planning</a>
            <a href="receiving.html" class="nav-link">Receiving</a>
            <a href="management.html" class="nav-link">Management</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="stat-card">
                <div class="card-title">Stock Quantity per Product (All Batches)</div>
                <div style="height: 450px;">
                    <canvas id="capacityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="stat-card">
                <div class="card-title text-danger">Expiry Alerts (Within 30 Days)</div>
                <div class="table-responsive" style="max-height: 450px;">
                    <table class="table table-sm table-hover align-middle">
                        <thead class="sticky-top bg-white">
                            <tr class="text-muted small">
                                <th>Name / Batch</th>
                                <th class="text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody id="expiryTableBody"></tbody>
                    </table>
                </div>
                <div id="noExpireMsg" class="text-center py-5 d-none">
                    <div class="text-success fw-bold">✅ ทุกรายการยังอยู่ในสภาพดี</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🚩 ฝัง URL ล่าสุดที่คุณส่งมาให้เรียบร้อยแล้วครับ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';

    window.onload = loadDashboard;

    async function loadDashboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            const json = await res.json();

            if (json.status === 'success') {
                renderCapacityChart(json.data.productionCapacity);
                renderExpiryTable(json.data.expiryTable);
                document.getElementById('refreshTime').innerText = "อัปเดตเมื่อ: " + new Date().toLocaleTimeString('th-TH');
            } else {
                alert("API Error: " + json.message);
            }
        } catch (e) {
            console.error(e);
            alert("ไม่สามารถโหลดข้อมูลได้: ตรวจสอบการตั้งค่า 'Anyone' ใน Deployment");
        } finally {
            document.getElementById('loader').classList.add('d-none');
        }
    }

    function renderCapacityChart(data) {
        const ctx = document.getElementById('capacityChart').getContext('2d');
        const labels = Object.keys(data);
        const values = Object.values(data);

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Qty',
                    data: values,
                    backgroundColor: 'rgba(2, 132, 199, 0.7)',
                    borderRadius: 8
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true } }
            }
        });
    }

    function renderExpiryTable(data) {
        const tbody = document.getElementById('expiryTableBody');
        const msg = document.getElementById('noExpireMsg');
        
        if (!data || data.length === 0) {
            msg.classList.remove('d-none');
            tbody.innerHTML = '';
            return;
        }

        tbody.innerHTML = data.map(i => `
            <tr>
                <td>
                    <div class="fw-bold text-dark small">${i.name}</div>
                    <div style="font-size: 0.7rem;" class="text-muted">Batch: ${i.batch}</div>
                </td>
                <td class="text-center">
                    <span class="badge ${i.days < 0 ? 'badge-expired' : (i.days <= 7 ? 'badge-urgent' : 'badge-warning')} rounded-pill px-3 py-2">
                        ${i.days < 0 ? 'หมดอายุ' : 'เหลือ ' + i.days + ' วัน'}
                    </span>
                </td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
