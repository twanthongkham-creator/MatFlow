<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .stat-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); height: 100%; border: none; }
        .card-title { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 20px; border-left: 4px solid #0284c7; padding-left: 12px; }
        .nav-link { font-weight: 600; color: #64748b; border-radius: 12px; padding: 10px 20px; transition: 0.3s; text-decoration: none; }
        .nav-link.active { background: #1e293b; color: white; }
        .badge-status { font-size: 0.75rem; padding: 6px 12px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 px-3">
        <div>
            <h2 class="fw-bold text-primary m-0">MatFlow Dashboard</h2>
            <p class="text-muted small m-0">วิเคราะห์กำลังการผลิตและวันหมดอายุวัตถุดิบ</p>
        </div>
        <div class="d-flex gap-2 bg-white p-2 rounded-4 shadow-sm">
            <a href="index.html" class="nav-link">Planning</a>
            <a href="receiving.html" class="nav-link">Receiving</a>
            <a href="management.html" class="nav-link">Management</a>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-7">
            <div class="stat-card">
                <div class="card-title">Production Capability (Potential Units per Product)</div>
                <div style="height: 450px;">
                    <canvas id="capacityChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="stat-card">
                <div class="card-title text-danger">Expiry Risk Inventory (Within 30 Days)</div>
                <div class="table-responsive" style="max-height: 450px;">
                    <table class="table table-hover align-middle">
                        <thead class="sticky-top bg-white">
                            <tr class="text-muted small">
                                <th>Name / Batch</th>
                                <th class="text-center">Days Remaining</th>
                            </tr>
                        </thead>
                        <tbody id="expiryTableBody">
                            <tr><td colspan="2" class="text-center py-5">⌛ กำลังประมวลผลข้อมูลคลังสินค้า...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';

    async function loadDashboard() {
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
            const json = await res.json();

            if (json.status === 'success') {
                renderChart(json.data.productionCapacity);
                renderTable(json.data.expiryTable);
            }
        } catch (e) { console.error(e); }
    }

    function renderChart(data) {
        const labels = Object.keys(data).filter(k => data[k] > 0);
        const values = labels.map(k => data[k]);

        new Chart(document.getElementById('capacityChart'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'ผลิตได้สูงสุด (Units)',
                    data: values,
                    backgroundColor: 'rgba(2, 132, 199, 0.7)',
                    borderColor: '#0284c7',
                    borderWidth: 2,
                    borderRadius: 10
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true, grid: { color: '#f1f5f9' } } }
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('expiryTableBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="text-center py-5 text-success fw-bold">✅ วัตถุดิบทุกรายการยังใช้งานได้ตามปกติ</td></tr>';
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr>
                <td>
                    <div class="fw-bold text-dark small">${item.name}</div>
                    <div style="font-size: 0.7rem;" class="text-muted">Batch: ${item.batch}</div>
                </td>
                <td class="text-center">
                    <span class="badge badge-status ${item.days <= 7 ? 'bg-danger' : 'bg-warning text-dark'}">
                        ${item.days < 0 ? 'หมดอายุแล้ว' : 'อีก ' + item.days + ' วัน'}
                    </span>
                </td>
            </tr>
        `).join('');
    }

    window.onload = loadDashboard;
</script>
</body>
</html>
