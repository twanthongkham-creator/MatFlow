<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MatFlow — Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="mf-theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
/* Dashboard Styling */
.smod-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,28,80,.55);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;padding:16px}
.smod-box{background:#f4f8ff;border-radius:24px;width:100%;max-width:900px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.smod-hd{background:linear-gradient(125deg,#00225c,#0047bf 55%,#1a6cf5);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.smod-body{padding:20px; overflow-y:auto; max-height:80vh;}
.smod-foot{background:#eef5ff;padding:14px 24px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #cbd5e1}
.email-label{font-size:11px;font-weight:700;color:#4a6380;margin-bottom:4px;display:block;text-transform:uppercase}
.email-input{width:100%;font-size:13px;border-radius:8px;padding:6px 12px;border:1.5px solid #cbd5e1;margin-bottom:12px}
.tw-compact { border-radius:10px; overflow:auto; border:1px solid #cbd5e1; background:#fff; }
.mt-compact { width:1%; min-width:100%; border-collapse:collapse; white-space:nowrap; }
.mt-compact thead th { padding:4px 10px; font-size:11px; font-weight:700; text-transform:uppercase; color:#475569; background:#f8fafc; border:1px solid #cbd5e1; text-align:center; }
.mt-compact tbody td { padding:4px 10px; font-size:13px; color:#0f172a; vertical-align:middle; border:1px solid #e2e8f0; }
.btn-report{background:linear-gradient(135deg,#1a6cf5,#003494);color:#fff;border:none;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px}
.btn-send-email{background:linear-gradient(135deg,#059669,#047857);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="toast" class="toast-mf" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f172a;color:#fff;border-radius:10px;padding:10px 20px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.20);transition:transform .3s,opacity .3s;opacity:0;z-index:99999;">
  <span id="toastMsg">สำเร็จ</span>
</div>

<div id="loader" class="loader" style="display:none">
  <div class="loader-box"><div class="spinner"></div><div class="loader-txt" id="loaderText">กำลังโหลด...</div></div>
</div>

<div id="sendModal" class="smod-overlay" style="display:none">
  <div class="smod-box">
    <div class="smod-hd"><div style="font-weight:700;">PREVIEW: ตารางสรุปแผนการผลิต (ทั้งหมด)</div><button style="background:none;border:none;color:#fff;font-size:20px;" onclick="closeSendModal()">×</button></div>
    <div class="smod-body">
      <div class="row g-2">
          <div class="col-6"><label class="email-label">To</label><input type="text" class="email-input" id="fieldTo" value="theewant@sermsukplc.com"></div>
          <div class="col-6"><label class="email-label">Cc</label><input type="text" class="email-input" id="fieldCc" value="tonxperianeov@gmail.com"></div>
      </div>
      <label class="email-label">Preview Email (Font: Cordia New)</label>
      <div style="background:#fff; border:1px solid #cbd5e1; border-radius:8px; padding:15px; overflow:auto;" id="emailPreviewArea"></div>
    </div>
    <div class="smod-foot">
      <button class="btn btn-outline" onclick="closeSendModal()">ยกเลิก</button>
      <button class="btn-send-email" id="btnSend" onclick="sendEmailNow()">🚀 ส่ง Email ทั้งหมด</button>
    </div>
  </div>
</div>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-ico"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="1"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/><line x1="12" y1="12" x2="12" y2="17"/><line x1="9.5" y1="14.5" x2="14.5" y2="14.5"/></svg></div>
      <span class="brand-name">MatFlow</span><div class="brand-sep"></div><span class="brand-sub">Inventory System</span>
    </a>
  </div>
</header>

<div class="shell">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">
    <div>
      <h1 style="font-size:21px;font-weight:700;">Analytics Dashboard</h1>
      <p style="font-size:12.5px;color:var(--txt3);">เรียงลำดับการผลิตจากมากไปน้อย (ข้อมูลทั้งหมด)</p>
    </div>
    <button class="btn-report" id="btnReport" onclick="openSendModal()" disabled>📧 ส่งรายงาน Email</button>
  </div>

  <div class="row g-3">
    <div class="col-lg-5"><div class="card-mf h-100"><div class="ctitle">Production Capability</div><div id="canvasParent"><canvas id="capacityChart"></canvas></div></div></div>
    <div class="col-lg-7">
      <div class="card-mf h-100">
        <div class="ctitle">รายละเอียดการผลิต (ทั้งหมด)</div>
        <div class="tw-compact" style="max-height:430px;"><table class="mt-compact"><thead id="webCapHead"></thead><tbody id="capDetailsBody"></tbody></table></div>
      </div>
    </div>
    <div class="col-12">
      <div class="card-mf">
        <div class="ctitle" style="color:#d97706;">Expiry Timeline (31-Day)</div>
        <div class="tw-compact" style="max-height:300px;"><table class="mt-compact"><thead id="webExpHead"></thead><tbody id="expiryTableBody"></tbody></table></div>
      </div>
    </div>
  </div>
</div>

<script src="mf-shared.js"></script>
<script>
const URL_API = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';
Chart.register(ChartDataLabels);
let _capDetails=[], _expData=[], cachedEmailHTML = '';

window.onload = loadAll;

async function loadAll(){
  mfShow('กำลังดึงข้อมูลทั้งหมด...');
  try {
    const r = await fetch(`${URL_API}?action=getDashboardData`);
    const jd = await r.json();
    if(jd.status==='success'){
      _capDetails = jd.capDetailsList; _expData = jd.expiryTable;
      renderChart(jd.capDetailsList);
      renderTable('capDetailsBody', 'webCapHead', _capDetails, ['ลำดับ','สำหรับสินค้า','วัตถุดิบ (ตัวคอขวด)','ผลิตได้ (Unit)']);
      renderTable('expiryTableBody', 'webExpHead', _expData, ['ลำดับ','RM Name','Batch','คงเหลือ (วัน)']);
      document.getElementById('btnReport').disabled = false;
    }
  } catch(e) { alert('โหลดข้อมูลล้มเหลว'); }
  mfHide();
}

function renderChart(list){
  const items = list.filter(i=>i.potential>0).slice(0,15);
  const ctx = document.getElementById('capacityChart').getContext('2d');
  if(window._ch) window._ch.destroy();
  window._ch = new Chart(ctx, {
    type:'bar', data:{ labels:items.map(i=>i.pName), datasets:[{data:items.map(i=>i.potential), backgroundColor:'#0ea5e9', barThickness:15}]},
    options:{ indexAxis:'y', plugins:{legend:{display:false}, datalabels:{anchor:'end', align:'right', formatter:v=>v.toLocaleString()+' U'}}, scales:{x:{display:false}}}
  });
}

function renderTable(bodyId, headId, data, cols){
  const head = document.getElementById(headId);
  head.innerHTML = `<tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const body = document.getElementById(bodyId);
  body.innerHTML = data.map((i,idx)=>`<tr>
    <td style="text-align:center;">${idx+1}</td>
    <td>${i.pName || i.name}</td>
    <td>${i.bottleneck || i.batch}</td>
    <td style="text-align:center; font-weight:700;">${(i.potential !== undefined ? i.potential : i.days).toLocaleString()}</td>
  </tr>`).join('');
}

function openSendModal() {
  const now = new Date().toLocaleString('th-TH');
  const subject = `รายงานสรุปแผนการผลิต ประจำวันที่ ${now}`;
  document.getElementById('fieldSubject').value = subject;

  // 🚩 สร้าง HTML ด้วย Cordia New และ Ultra Compact (แสดงทุกรายการ)
  let capRows = _capDetails.map((i,idx)=>`
    <tr style="height:20px;">
      <td style="border:1px solid #cbd5e1; padding:2px 5px; text-align:center;">${idx+1}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px;">${i.pName}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px;">${i.bottleneck}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px; text-align:center; font-weight:bold;">${i.potential.toLocaleString()}</td>
    </tr>`).join('');

  let expRows = _expData.map((i,idx)=>`
    <tr style="height:20px;">
      <td style="border:1px solid #cbd5e1; padding:2px 5px; text-align:center;">${idx+1}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px;">${i.name}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px; text-align:center;">${i.batch}</td>
      <td style="border:1px solid #cbd5e1; padding:2px 5px; text-align:center; color:${i.days<=7?'red':'black'}; font-weight:bold;">${i.days} วัน</td>
    </tr>`).join('');

  cachedEmailHTML = `
    <div style="font-family:'Cordia New', 'MS Sans Serif', sans-serif; color:#0f172a;">
      <h2 style="font-size:16pt; font-weight:bold; margin:0 0 10px; color:#1a6cf5;">${subject}</h2>
      
      <h3 style="font-size:14pt; font-weight:bold; margin:15px 0 5px;">📊 รายละเอียดความสามารถการผลิต (ทุกรายการ)</h3>
      <table style="width:100%; border-collapse:collapse; font-size:12pt;">
        <thead><tr style="background:#f1f5f9; font-size:14pt; font-weight:bold;">
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">ลำดับ</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">สินค้า</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">RM ที่เป็นข้อจำกัด</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">ผลิตได้ (Unit)</th>
        </tr></thead>
        <tbody>${capRows}</tbody>
      </table>

      <h3 style="font-size:14pt; font-weight:bold; margin:20px 0 5px;">📅 วัตถุดิบใกล้หมดอายุ (Timeline 31 วัน)</h3>
      <table style="width:100%; border-collapse:collapse; font-size:12pt;">
        <thead><tr style="background:#fef3c7; font-size:14pt; font-weight:bold;">
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">ลำดับ</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">RM Name</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">Batch</th>
          <th style="border:1px solid #cbd5e1; padding:2px 5px;">คงเหลือ</th>
        </tr></thead>
        <tbody>${expRows}</tbody>
      </table>
    </div>`;

  document.getElementById('emailPreviewArea').innerHTML = cachedEmailHTML;
  document.getElementById('sendModal').style.display='flex';
}

function closeSendModal(){document.getElementById('sendModal').style.display='none';}

async function sendEmailNow(){
  const btn = document.getElementById('btnSend');
  btn.disabled = true; btn.innerHTML = "กำลังส่งผ่านระบบ Backend...";
  
  try {
    const res = await fetch(URL_API, {
      method: 'POST',
      body: JSON.stringify({
        action: 'sendEmail',
        to: document.getElementById('fieldTo').value,
        cc: document.getElementById('fieldCc').value,
        subject: document.getElementById('fieldSubject').value,
        body: cachedEmailHTML
      })
    });
    const j = await res.json();
    if(j.status==='success'){ 
      alert('✅ ส่ง Email สำเร็จ (ส่งครบทุกรายการ)'); 
      closeSendModal(); 
    } else { throw new Error(); }
  } catch(e) { alert('❌ ส่งล้มเหลว ตรวจสอบสิทธิ์การส่ง Email ใน Apps Script'); }
  btn.disabled = false; btn.innerHTML = "🚀 ส่ง Email ทั้งหมด";
}

function mfShow(t){document.getElementById('loaderText').textContent=t;document.getElementById('loader').style.display='flex';}
function mfHide(){document.getElementById('loader').style.display='none';}
</script>
</body>
</html>
