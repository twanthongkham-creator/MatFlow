<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatFlow Management Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f1f5f9; }
        .table-container { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .sticky-header { position: sticky; top: 0; background: #1e293b; color: white; z-index: 10; }
        .btn-edit { background: #0ea5e9; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.9rem; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 0.9rem; margin-left: 2px; }
        
        /* Compact Modal Styling */
        .modal-content { border-radius: 20px; border: none; overflow: hidden; }
        .modal-header { background: #1e293b; color: white; padding: 12px 20px; border: none; }
        .modal-body { padding: 15px 20px !important; }
        .qty-hero { background: #f0f9ff; border: 2px solid #bae6fd; border-radius: 15px; padding: 10px; text-align: center; margin-bottom: 12px; }
        .qty-hero input { font-size: 2.2rem; font-weight: 700; color: #0284c7; border: none; background: transparent; width: 100%; text-align: center; outline: none; }
        .info-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
        .info-value { font-size: 0.9rem; font-weight: 600; color: #1e293b; margin-bottom: 8px; line-height: 1.2; }
        .date-input-group { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 8px; }
        .form-control-sm { font-size: 0.85rem; }
        .extend-box { background: #fff7ed; border: 1px dashed #fb923c; border-radius: 10px; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold text-primary m-0">🛠️ MatFlow Management</h3>
        <div class="d-flex gap-2">
            <a href="index.html" class="btn btn-sm btn-outline-secondary px-3">เบิกจ่าย</a>
            <a href="receiving.html" class="btn btn-sm btn-outline-warning px-3">รับเข้า</a>
        </div>
    </div>

    <div class="bg-white rounded-4 p-3 mb-3 shadow-sm">
        <div class="row g-2">
            <div class="col-md-3">
                <select id="filterProduct" class="form-select form-select-sm" onchange="applyFilters()"><option value="">สินค้าทั้งหมด</option></select>
            </div>
            <div class="col-md-3">
                <select id="filterName" class="form-select form-select-sm" onchange="applyFilters()"><option value="">RM ทั้งหมด</option></select>
            </div>
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-select-sm" placeholder="ค้นหา Batch, Code, Supplier..." oninput="applyFilters()">
            </div>
        </div>
    </div>

    <div class="table-container">
        <div class="table-responsive" style="max-height: 75vh;">
            <table class="table table-sm table-hover align-middle">
                <thead class="sticky-header">
                    <tr>
                        <th>Code</th>
                        <th>Name (RM)</th>
                        <th>Batch</th>
                        <th class="text-center">Qty</th>
                        <th class="text-center">MFG</th>
                        <th class="text-center">BBF (เดิม)</th>
                        <th class="text-center">Extended</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr><td colspan="8" class="text-center py-5">⌛ กำลังโหลดและจัดเรียง...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">แก้ไข Batch: <span id="modalBatchTitle"></span></h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-2 mb-2">
                    <div class="col-7">
                        <div class="info-label">Name (RM)</div>
                        <div id="modalRMName" class="info-value text-truncate">-</div>
                    </div>
                    <div class="col-5">
                        <div class="info-label">Supplier</div>
                        <div id="modalSupplier" class="info-value text-truncate">-</div>
                    </div>
                </div>

                <div class="qty-hero">
                    <div class="info-label text-primary">จำนวนคงเหลือ (Quantity)</div>
                    <input type="number" id="editQty">
                    <div id="modalUnit" class="fw-bold text-muted small" style="font-size: 0.75rem;">-</div>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <div class="date-input-group">
                            <label class="info-label text-primary">วันผลิต (MFG)</label>
                            <input type="date" id="editMfg" class="form-control form-control-sm border-0 bg-transparent p-0 fw-bold">
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="date-input-group">
                            <label class="info-label text-danger">วันหมดอายุ (BBF)</label>
                            <input type="date" id="editExp" class="form-control form-control-sm border-0 bg-transparent p-0 fw-bold">
                        </div>
                    </div>
                </div>

                <div class="p-2 border rounded-3 bg-light">
                    <div class="form-check form-switch d-flex justify-content-between align-items-center p-0">
                        <label class="form-check-label fw-bold text-secondary small" for="toggleExtend">⚠️ ต่ออายุวัตถุดิบ (Extended)</label>
                        <input class="form-check-input ms-0" type="checkbox" id="toggleExtend" onchange="toggleExtendField()">
                    </div>
                    <div id="extendField" class="extend-box">
                        <label class="info-label text-danger">วันที่ต่ออายุใหม่:</label>
                        <input type="date" id="editExtExp" class="form-control form-control-sm">
                    </div>
                </div>

                <div class="mt-3">
                    <label class="info-label">แก้ไขเลข Batch</label>
                    <input type="text" id="editBatch" class="form-control form-control-sm">
                </div>
            </div>
            <div class="modal-footer border-0 p-2 px-4 pb-4">
                <button type="button" class="btn btn-sm btn-light px-3" data-bs-dismiss="modal">ปิด</button>
                <button type="button" class="btn btn-sm btn-primary px-4 fw-bold rounded-pill shadow" onclick="saveEdit()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2cy6sH-xwGsZoClvdXW1I4XoBbxT1DYOesqjMHpM1KUiRe0gZxjkPvWijne-PExQW/exec';
    let rawData = [];
    let currentEditIdx = null;
    const modal = new bootstrap.Modal(document.getElementById('editModal'));

    window.onload = loadData;

    async function loadData() {
        const res = await fetch(`${SCRIPT_URL}?action=getMonitorData`);
        const json = await res.json();
        rawData = json.data;
        
        const products = [...new Set(rawData.map(i => i.productName))].sort();
        const names = [...new Set(rawData.map(i => i.name))].sort();
        products.forEach(p => document.getElementById('filterProduct').innerHTML += `<option value="${p}">${p}</option>`);
        names.forEach(n => document.getElementById('filterName').innerHTML += `<option value="${n}">${n}</option>`);
        
        applyFilters();
    }

    function applyFilters() {
        const pFilter = document.getElementById('filterProduct').value;
        const nFilter = document.getElementById('filterName').value;
        const search = document.getElementById('searchInput').value.toLowerCase();

        let filtered = rawData.filter(i => {
            return (pFilter === "" || i.productName === pFilter) &&
                   (nFilter === "" || i.name === nFilter) &&
                   (Object.values(i).some(v => String(v).toLowerCase().includes(search)));
        });

        // SORTING: เรียงตามวันหมดอายุจริง (Extended หรือ Exp)
        filtered.sort((a, b) => new Date(a.extExp || a.exp) - new Date(b.extExp || b.exp));

        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = filtered.map(i => `
            <tr>
                <td><small class="fw-bold text-muted">${i.code}</small></td>
                <td class="small">${i.name}</td>
                <td class="small fw-bold">${i.batch}</td>
                <td class="text-center fw-bold text-primary">${i.qty}</td>
                <td class="text-center small">${formatDisplayDate(i.mfg)}</td>
                <td class="text-center small">${formatDisplayDate(i.exp)}</td>
                <td class="text-center">
                    ${i.extExp ? `<span class="badge bg-info-subtle text-info-emphasis border border-info-subtle" style="font-size: 0.7rem;">${formatDisplayDate(i.extExp)}</span>` : '-'}
                </td>
                <td class="text-center">
                    <button class="btn-edit" onclick="openEdit(${i.rowIdx})">แก้</button>
                    <button class="btn-delete" onclick="confirmDelete(${i.rowIdx}, '${i.batch}')">ลบ</button>
                </td>
            </tr>
        `).join('');
    }

    function formatDisplayDate(dateStr) {
        if (!dateStr || dateStr === "") return "-";
        const date = new Date(dateStr);
        return isNaN(date) ? dateStr : date.toLocaleDateString('en-GB'); 
    }

    function formatInputDate(dateStr) {
        if (!dateStr || dateStr === "") return "";
        const date = new Date(dateStr);
        return isNaN(date) ? "" : date.toISOString().split('T')[0];
    }

    function toggleExtendField() {
        const isChecked = document.getElementById('toggleExtend').checked;
        document.getElementById('extendField').style.display = isChecked ? 'block' : 'none';
    }

    function openEdit(rowIdx) {
        let item = rawData.find(i => i.rowIdx === rowIdx);
        currentEditIdx = rowIdx;
        document.getElementById('modalBatchTitle').innerText = item.batch;
        document.getElementById('modalRMName').innerText = item.name;
        document.getElementById('modalSupplier').innerText = item.supplier || '-';
        document.getElementById('modalUnit').innerText = item.unit || 'UNIT';
        document.getElementById('editBatch').value = item.batch;
        document.getElementById('editQty').value = item.qty;
        document.getElementById('editMfg').value = formatInputDate(item.mfg);
        document.getElementById('editExp').value = formatInputDate(item.exp);
        
        if(item.extExp) {
            document.getElementById('toggleExtend').checked = true;
            document.getElementById('editExtExp').value = formatInputDate(item.extExp);
            document.getElementById('extendField').style.display = 'block';
        } else {
            document.getElementById('toggleExtend').checked = false;
            document.getElementById('editExtExp').value = "";
            document.getElementById('extendField').style.display = 'none';
        }
        modal.show();
    }

    async function saveEdit() {
        let item = rawData.find(i => i.rowIdx === currentEditIdx);
        const isExtended = document.getElementById('toggleExtend').checked;
        const updated = {
            ...item,
            batch: document.getElementById('editBatch').value,
            qty: parseFloat(document.getElementById('editQty').value),
            mfg: document.getElementById('editMfg').value,
            exp: document.getElementById('editExp').value,
            extExp: isExtended ? document.getElementById('editExtExp').value : ""
        };
        const btn = document.querySelector('.modal-footer .btn-primary');
        btn.disabled = true; btn.innerText = "บันทึก...";
        try {
            const res = await fetch(`${SCRIPT_URL}?action=updateMonitor&rowData=${encodeURIComponent(JSON.stringify(updated))}`);
            const json = await res.json();
            if(json.status === 'success') {
                const idx = rawData.findIndex(i => i.rowIdx === currentEditIdx);
                rawData[idx] = updated;
                applyFilters();
                modal.hide();
            }
        } catch(e) { alert("ล้มเหลว"); }
        finally { btn.disabled = false; btn.innerText = "บันทึกข้อมูล"; }
    }

    function confirmDelete(rowIdx, batch) {
        if (confirm(`⚠️ ยืนยันการลบ Batch: ${batch}?`)) {
            doDelete(rowIdx);
        }
    }

    async function doDelete(rowIdx) {
        try {
            await fetch(`${SCRIPT_URL}?action=deleteMonitor&rowIdx=${rowIdx}`);
            rawData = rawData.filter(i => i.rowIdx !== rowIdx).map(i => i.rowIdx > rowIdx ? {...i, rowIdx: i.rowIdx-1} : i);
            applyFilters();
        } catch(e) { alert("ล้มเหลว"); }
    }
</script>
</body>
</html>
